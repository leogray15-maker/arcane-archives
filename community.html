<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png" />

    <!-- 🔒 Protect Community Page (paid + logged in only) -->
    <script type="module">
        import { protectPage } from "./auth-guard.js";
        protectPage({ requireSubscription: true });
    </script>

    <style>
        :root {
            --bg-dark: #02010a;
            --bg-card: rgba(15, 23, 42, 0.96);

            --purple: #9333ea;
            --purple-light: #a78bfa;
            --purple-bright: #c084fc;
            --purple-glow: rgba(147, 51, 234, 0.28);

            --text-light: #e5e7eb;
            --text-dim: #9ca3af;

            --border-subtle: rgba(148, 163, 184, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui;
            background: radial-gradient(circle at top, #111827 0, #02010a 45%, #000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-light);
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 1.2rem;
            left: 1.3rem;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,.4);
            background: rgba(15,23,42,.9);
            color: var(--text-dim);
            padding: .38rem .9rem;
            text-decoration: none;
            font-size: .85rem;
            display: inline-flex; align-items: center;
            gap: .4rem;
            backdrop-filter: blur(12px);
            z-index: 99;
            transition: .25s;
        }

        .back-btn::before { content: "←"; }

        .back-btn:hover {
            color: var(--purple-light);
            border-color: var(--purple-light);
            transform: translateY(-1px);
        }

        /* Header */
        .header {
            max-width: 1200px;
            padding: 4rem 1.5rem 1.2rem;
            margin: 0 auto;
        }

        .logo {
            display: flex; align-items: center; gap: .7rem;
            font-weight: 800; letter-spacing: .1em;
        }

        .logo img { width: 32px; height: 32px; }

        /* Main layout */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem 4rem;
            flex: 1;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: .3rem;
        }

        .page-title span {
            background: linear-gradient(120deg, #fbbf24, #a855f7, #22c55e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .page-sub {
            font-size: .95rem;
            color: var(--text-dim);
            margin-bottom: 1.8rem;
            max-width: 32rem;
        }

        /* Chat container */
        .community-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 25px 90px rgba(0,0,0,.6);
            overflow: hidden;
            position: relative;
        }

        .community-header {
            padding: 1.2rem 1.4rem;
            border-bottom: 1px solid rgba(148,163,184,.2);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: .02em;
        }

        .messages-box {
            height: 480px;
            overflow-y: auto;
            padding: 1.2rem 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        /* Message bubble */
        .msg {
            padding: .9rem 1rem;
            border-radius: 14px;
            background: rgba(17,24,39,0.9);
            border: 1px solid rgba(148,163,184,0.35);
            animation: fadeUp .3s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: .4rem;
        }

        .msg-user img {
            width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
            border: 1px solid var(--purple-light);
        }

        .msg-username {
            font-size: .85rem;
            font-weight: 600;
            color: var(--purple-light);
        }

        .msg-text {
            font-size: .9rem;
            line-height: 1.45rem;
        }

        .msg-time {
            font-size: .75rem;
            margin-top: .3rem;
            color: var(--text-dim);
        }

        /* Input area */
        .input-area {
            padding: 1rem 1.4rem;
            border-top: 1px solid rgba(148,163,184,.2);
            display: flex;
            gap: .8rem;
        }

        .input-area input {
            flex: 1;
            padding: .8rem 1rem;
            background: rgba(17,24,39,.85);
            border: 1px solid rgba(148,163,184,.4);
            border-radius: 12px;
            color: var(--text-light);
            font-size: .9rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 1px var(--purple-light);
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            padding: .8rem 1.3rem;
            border-radius: 12px;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: .88rem;
            transition: .25s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(147,51,234,.3);
        }

        footer {
            border-top: 1px solid rgba(31,41,55,.9);
            background: radial-gradient(circle at top, rgba(15,23,42,.98), #020617 55%, #000 100%);
            padding: 1.4rem 1.5rem 1.5rem;
        }

        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex; flex-direction: column; gap: .75rem;
        }

        .footer-links {
            display: flex; flex-wrap: wrap; gap: .9rem 1.4rem;
            font-size: .82rem;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
        }

        .footer-links a:hover { color: var(--purple-light); }

        .footer-bottom {
            color: var(--text-dim);
            font-size: .85rem;
        }

        @media (max-width: 768px) {
            .header { padding-top: 1rem; }
            .back-btn { position: static; margin: 1rem auto 0; }
        }
    </style>

    <link rel="stylesheet" href="../notion-arcane.css" />
    <script type="module" src="../notion-protect.js"></script>
</head>

<body>

<a href="dashboard.html" class="back-btn">Back</a>

<div class="header">
    <div class="logo">
        <img src="ArcaneA.png" />
        THE ARCANE ARCHIVES
    </div>
</div>

<div class="main-content">

    <h1 class="page-title">The <span>Community</span></h1>
    <p class="page-sub">Speak, ask, share, network. This is your inner circle.</p>

    <div class="community-card">

        <div class="community-header">Live Feed</div>

        <div id="messagesBox" class="messages-box">
            <!-- Messages load here -->
        </div>

        <div class="input-area">
            <input id="messageInput" type="text" placeholder="Send a message..." />
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<footer>
    <div class="footer-inner">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="Privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="refund-policy.html">Refund Policy</a>
        </div>
        <div class="footer-bottom">
            © 2024 The Arcane Archives. All rights reserved.
        </div>
    </div>
</footer>

<!-- Chat Logic -->
<script type="module">
    import { auth, db } from "./auth-guard.js";
    import {
        collection, addDoc, serverTimestamp, query, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const messagesBox = document.getElementById("messagesBox");
    const messageInput = document.getElementById("messageInput");

    let currentUserData = {
        name: "Member",
        avatar: "default-avatar.png"
    };

    // Load user data for chat bubbles
    auth.onAuthStateChanged(async (user) => {
        if (!user) return;
        const docRef = collection(db, "Users");
        const snap = await (await import("https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js"))
            .getDoc((await import("https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js"))
            .doc(db, "Users", user.uid));

        if (snap.exists()) {
            const d = snap.data();
            currentUserData.name = d.Username || "Member";
            currentUserData.avatar =
                localStorage.getItem("customAvatarUrl") ||
                d.avatar ||
                "default-avatar.png";
        }
    });

    // Load messages live
    const q = query(
        collection(db, "community"),
        orderBy("timestamp", "asc")
    );

    onSnapshot(q, (snapshot) => {
        messagesBox.innerHTML = "";

        snapshot.forEach((doc) => {
            const m = doc.data();

            const wrapper = document.createElement("div");
            wrapper.className = "msg";

            wrapper.innerHTML = `
                <div class="msg-user">
                    <img src="${m.avatar}" />
                    <span class="msg-username">${m.username}</span>
                </div>
                <div class="msg-text">${m.message}</div>
                <div class="msg-time">${new Date(m.timestamp?.toDate()).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</div>
            `;

            messagesBox.appendChild(wrapper);
        });

        messagesBox.scrollTop = messagesBox.scrollHeight;
    });

    // Send message
    window.sendMessage = async function () {
        const text = messageInput.value.trim();
        if (!text) return;

        await addDoc(collection(db, "community"), {
            username: currentUserData.name,
            avatar: currentUserData.avatar,
            message: text,
            timestamp: serverTimestamp()
        });

        messageInput.value = "";
    };
</script>

</body>
</html>
