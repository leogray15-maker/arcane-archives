<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
        }

        .nav-container {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 250px;
            height: calc(100vh - 70px);
            background: var(--bg-darker);
            border-right: 1px solid rgba(147, 51, 234, 0.2);
            padding: 2rem 0;
            overflow-y: auto;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .sidebar-menu a:hover {
            background: rgba(147, 51, 234, 0.1);
            color: var(--purple-light);
        }

        .sidebar-menu a.active {
            background: rgba(147, 51, 234, 0.2);
            color: var(--purple-light);
            border-left: 3px solid var(--purple);
        }

        .main-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 3rem;
            min-height: calc(100vh - 70px);
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .course-card {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 2rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-5px);
            border-color: var(--purple);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
        }

        .course-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .course-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--purple-light);
            margin-bottom: 0.5rem;
        }

        .course-description {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .course-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .course-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--purple-light);
        }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--bg-darker);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 2rem;
            color: var(--purple-light);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
        }

        .close-modal:hover {
            color: var(--purple);
        }

        .modal-body {
            padding: 2rem;
        }

        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .lesson-item {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lesson-item:hover {
            border-color: var(--purple);
            transform: translateX(5px);
        }

        .lesson-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: var(--purple);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: 700;
            margin-right: 1rem;
        }

        .lesson-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .lesson-duration {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* VIDEO PLAYER STYLES */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .lesson-content {
            display: none;
        }

        .lesson-content.active {
            display: block;
        }

        .lesson-text {
            line-height: 1.8;
            color: var(--text-light);
            margin-top: 1.5rem;
        }

        .lesson-text h2 {
            color: var(--purple-light);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        .lesson-text h3 {
            color: var(--purple-light);
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
        }

        .lesson-text p {
            margin-bottom: 1rem;
        }

        .lesson-text ul, .lesson-text ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .lesson-text li {
            margin-bottom: 0.5rem;
        }

        .back-to-lessons {
            background: rgba(147, 51, 234, 0.2);
            border: 1px solid var(--purple);
            color: var(--purple-light);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .back-to-lessons:hover {
            background: rgba(147, 51, 234, 0.3);
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -250px;
                transition: left 0.3s;
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                margin-left: 0;
                padding: 2rem 1rem;
            }

            .menu-toggle {
                display: block;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                margin: 1rem;
            }

            .modal-body {
                padding: 1rem;
            }
        }

        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
            margin-top: 4rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--purple-light);
        }

        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <a href="dashboard.html" class="logo">
                <img src="ArcaneA.png" alt="Logo"> THE ARCANE ARCHIVES
            </a>
            <div class="user-avatar" id="userAvatar">?</div>
        </div>
    </nav>

    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="courses.html" class="active">📚 All Courses</a></li>
            <li><a href="community.html">💬 Community</a></li>
            <li><a href="live-calls.html">🎙️ Live Calls</a></li>
            <li><a href="wins.html">🏆 Wins Board</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>📚 All Courses</h1>
            <p>Master the forbidden arts of business, wealth, and consciousness</p>
        </div>

        <div class="courses-grid" id="coursesGrid">
            <!-- Courses will be dynamically loaded here -->
        </div>
    </main>

    <!-- COURSE MODAL -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Course Title</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Lesson List View -->
                <div id="lessonListView" class="lesson-list"></div>
                
                <!-- Lesson Content View -->
                <div id="lessonContentView" class="lesson-content">
                    <button class="back-to-lessons" onclick="showLessonList()">← Back to Lessons</button>
                    <div id="lessonVideoContainer"></div>
                    <div id="lessonTextContainer" class="lesson-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { protectPage, updateUserAvatar, setupMobileMenu } from './auth-guard.js';

    protectPage({
        onSuccess: (user, userData) => {
            console.log('✅ Access granted');
            updateUserAvatar(user, userData);
        }
    });

    setupMobileMenu();

    // COURSE DATA
    const courses = [
        {
            id: 'wealth-mastery',
            icon: '💰',
            title: 'Wealth Mastery',
            description: 'Learn the ancient principles of wealth creation and financial abundance that the elite don\'t want you to know.',
            lessonsCount: 12,
            level: 'Beginner',
            lessons: [
                {
                    number: 1,
                    title: 'The Wealth Mindset',
                    duration: '15 min',
                    videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', // Replace with your video
                    content: `
                        <h2>Welcome to Wealth Mastery</h2>
                        <p>In this lesson, we'll explore the fundamental mindset shifts required to create lasting wealth.</p>
                        
                        <h3>Key Concepts:</h3>
                        <ul>
                            <li>Abundance vs. Scarcity thinking</li>
                            <li>Money as energy and exchange</li>
                            <li>Breaking limiting beliefs about wealth</li>
                            <li>The power of delayed gratification</li>
                        </ul>
                        
                        <h3>Action Steps:</h3>
                        <ol>
                            <li>Write down your current beliefs about money</li>
                            <li>Identify which beliefs are limiting you</li>
                            <li>Create new empowering beliefs</li>
                            <li>Practice daily affirmations</li>
                        </ol>
                        
                        <p>Remember: Wealth starts in the mind before it manifests in reality.</p>
                    `
                },
                {
                    number: 2,
                    title: 'Multiple Income Streams',
                    duration: '20 min',
                    videoUrl: 'https://www.youtube.com/embed/YOUR_VIDEO_ID', // Replace
                    content: `
                        <h2>Building Multiple Income Streams</h2>
                        <p>Never rely on a single source of income. Learn how to diversify your income streams.</p>
                        
                        <h3>Types of Income:</h3>
                        <ul>
                            <li><strong>Active Income:</strong> Trading time for money</li>
                            <li><strong>Passive Income:</strong> Money while you sleep</li>
                            <li><strong>Portfolio Income:</strong> Investments and dividends</li>
                        </ul>
                        
                        <h3>Examples of Income Streams:</h3>
                        <ol>
                            <li>Primary job or business</li>
                            <li>Side hustle or freelancing</li>
                            <li>Real estate investments</li>
                            <li>Stock market investments</li>
                            <li>Digital products or courses</li>
                            <li>Affiliate marketing</li>
                        </ol>
                        
                        <p>Start with 2-3 streams and expand from there.</p>
                    `
                },
                {
                    number: 3,
                    title: 'Investment Fundamentals',
                    duration: '25 min',
                    videoUrl: '', // No video, text only
                    content: `
                        <h2>Investment Fundamentals</h2>
                        <p>Understanding how to make your money work for you is the key to building lasting wealth.</p>
                        
                        <h3>Core Investment Principles:</h3>
                        <ul>
                            <li>Start early - compound interest is your friend</li>
                            <li>Diversify your portfolio</li>
                            <li>Think long-term (10+ years)</li>
                            <li>Invest in what you understand</li>
                            <li>Keep emotions out of investing</li>
                        </ul>
                        
                        <h3>Investment Vehicles:</h3>
                        <ol>
                            <li><strong>Stocks:</strong> Ownership in companies</li>
                            <li><strong>Bonds:</strong> Lending to governments/corporations</li>
                            <li><strong>Real Estate:</strong> Physical property investments</li>
                            <li><strong>Index Funds:</strong> Diversified market exposure</li>
                            <li><strong>Cryptocurrency:</strong> Digital assets (high risk)</li>
                        </ol>
                        
                        <h3>Getting Started:</h3>
                        <p>Begin with low-cost index funds if you're new to investing. Invest consistently every month, regardless of market conditions.</p>
                    `
                }
            ]
        },
        {
            id: 'mind-control',
            icon: '🧠',
            title: 'Mind Control',
            description: 'Unlock the secrets of influence, persuasion, and psychological mastery to bend reality to your will.',
            lessonsCount: 15,
            level: 'Advanced',
            lessons: [
                {
                    number: 1,
                    title: 'Psychology of Influence',
                    duration: '18 min',
                    videoUrl: 'https://www.youtube.com/embed/YOUR_VIDEO_ID',
                    content: `
                        <h2>The Psychology of Influence</h2>
                        <p>Learn the psychological principles that govern human behavior and decision-making.</p>
                        
                        <h3>6 Principles of Influence (Cialdini):</h3>
                        <ol>
                            <li><strong>Reciprocity:</strong> People feel obligated to return favors</li>
                            <li><strong>Commitment:</strong> People stick to what they commit to</li>
                            <li><strong>Social Proof:</strong> People follow what others do</li>
                            <li><strong>Authority:</strong> People respect authority figures</li>
                            <li><strong>Liking:</strong> People say yes to those they like</li>
                            <li><strong>Scarcity:</strong> People want what's rare or limited</li>
                        </ol>
                        
                        <h3>Practical Applications:</h3>
                        <ul>
                            <li>In business negotiations</li>
                            <li>In marketing and sales</li>
                            <li>In personal relationships</li>
                            <li>In leadership and management</li>
                        </ul>
                    `
                }
            ]
        },
        {
            id: 'physical-alchemy',
            icon: '💪',
            title: 'Physical Alchemy',
            description: 'Transform your body into a weapon through ancient strength training and modern biohacking techniques.',
            lessonsCount: 10,
            level: 'Intermediate',
            lessons: []
        }
    ];

    // Render courses
    function renderCourses() {
        const grid = document.getElementById('coursesGrid');
        grid.innerHTML = courses.map(course => `
            <div class="course-card" onclick="openCourseModal('${course.id}')">
                <div class="course-icon">${course.icon}</div>
                <div class="course-title">${course.title}</div>
                <div class="course-description">${course.description}</div>
                <div class="course-meta">
                    <span class="course-badge">${course.lessonsCount} Lessons</span>
                    <span class="course-badge">${course.level}</span>
                </div>
            </div>
        `).join('');
    }

    // Open course modal
    window.openCourseModal = function(courseId) {
        const course = courses.find(c => c.id === courseId);
        if (!course) return;

        document.getElementById('modalTitle').textContent = course.title;
        
        // Render lesson list
        const lessonList = document.getElementById('lessonListView');
        if (course.lessons.length === 0) {
            lessonList.innerHTML = '<p style="text-align:center; color: var(--text-dim); padding: 2rem;">Lessons coming soon...</p>';
        } else {
            lessonList.innerHTML = course.lessons.map(lesson => `
                <div class="lesson-item" onclick="openLesson('${courseId}', ${lesson.number})">
                    <span class="lesson-number">${lesson.number}</span>
                    <div style="display: inline-block;">
                        <div class="lesson-title">${lesson.title}</div>
                        <div class="lesson-duration">⏱️ ${lesson.duration}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('lessonListView').style.display = 'flex';
        document.getElementById('lessonContentView').classList.remove('active');
        document.getElementById('courseModal').classList.add('active');
    };

    // Open specific lesson
    window.openLesson = function(courseId, lessonNumber) {
        const course = courses.find(c => c.id === courseId);
        const lesson = course.lessons.find(l => l.number === lessonNumber);
        
        if (!lesson) return;

        // Show video if available
        const videoContainer = document.getElementById('lessonVideoContainer');
        if (lesson.videoUrl) {
            videoContainer.innerHTML = `
                <div class="video-container">
                    <iframe 
                        src="${lesson.videoUrl}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
            `;
        } else {
            videoContainer.innerHTML = '';
        }

        // Show text content
        document.getElementById('lessonTextContainer').innerHTML = `
            <h2>${lesson.title}</h2>
            ${lesson.content}
        `;

        document.getElementById('lessonListView').style.display = 'none';
        document.getElementById('lessonContentView').classList.add('active');
    };

    // Back to lesson list
    window.showLessonList = function() {
        document.getElementById('lessonListView').style.display = 'flex';
        document.getElementById('lessonContentView').classList.remove('active');
    };

    // Close modal
    window.closeModal = function() {
        document.getElementById('courseModal').classList.remove('active');
    };

    // Close on outside click
    document.getElementById('courseModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // Initialize
    renderCourses();
</script>

</body>
</html>
