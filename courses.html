<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #050509;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
            --border-color: rgba(147, 51, 234, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #111827 0, #02010a 45%, #000 100%);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* NAVBAR */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(147, 51, 234, 0.25);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            font-size: 0.95rem;
            text-decoration: none;
            color: var(--text-light);
        }

        .logo img {
            height: 32px;
            width: 32px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: radial-gradient(circle, #a78bfa, #4c1d95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* BACK LINK + PAGE CARD LAYOUT */
        .main-content {
            max-width: 1100px;
            margin: 2.5rem auto 4rem;
            padding: 0 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 1.25rem;
            transition: color 0.2s, transform 0.2s;
        }

        .back-link:hover {
            color: var(--purple-light);
            transform: translateX(-2px);
        }

        .page-card {
            background: radial-gradient(circle at top left, rgba(147, 51, 234, 0.16) 0, rgba(15, 23, 42, 0.96) 40%, rgba(3, 7, 18, 0.98) 100%);
            border-radius: 20px;
            border: 1px solid rgba(147, 51, 234, 0.45);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .page-card::before {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(circle at 0 0, rgba(147, 51, 234, 0.18), transparent 55%),
                radial-gradient(circle at 100% 0, rgba(79, 70, 229, 0.15), transparent 55%);
            opacity: 0.6;
            pointer-events: none;
        }

        .page-card-inner {
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            letter-spacing: 0.04em;
            margin-bottom: 0.45rem;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 0.98rem;
        }

        /* COURSES GRID */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.5rem;
        }

        .course-card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 1.4rem;
            border: 1px solid rgba(148, 163, 184, 0.3);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .course-card:hover {
            transform: translateY(-4px);
            border-color: rgba(147, 51, 234, 0.8);
            box-shadow: 0 18px 35px rgba(15, 23, 42, 0.9);
            background: radial-gradient(circle at top, rgba(147, 51, 234, 0.20), rgba(15, 23, 42, 0.96));
        }

        .course-icon {
            font-size: 1.6rem;
        }

        .course-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .course-description {
            font-size: 0.92rem;
            color: var(--text-dim);
        }

        .course-meta {
            margin-top: 0.4rem;
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .course-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.55rem;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: var(--text-dim);
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(3, 7, 18, 0.75);
            backdrop-filter: blur(10px);
            z-index: 80;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #020617;
            border-radius: 18px;
            border: 1px solid rgba(147, 51, 234, 0.45);
            max-width: 960px;
            width: 95%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(30, 64, 175, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .modal-title {
            font-size: 1.1rem;
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.4rem;
            cursor: pointer;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 1rem;
            padding: 1rem 1.5rem 1.5rem;
            overflow: hidden;
        }

        .lesson-list {
            border-right: 1px solid rgba(30, 64, 175, 0.7);
            padding-right: 1rem;
            overflow-y: auto;
        }

        .lesson-item {
            padding: 0.6rem 0.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 0.2rem;
            color: var(--text-dim);
        }

        .lesson-item.active {
            background: rgba(79, 70, 229, 0.2);
            color: var(--text-light);
        }

        .lesson-content {
            overflow-y: auto;
        }

        .back-to-lessons {
            background: rgba(147, 51, 234, 0.2);
            border: 1px solid var(--purple);
            color: var(--purple-light);
            padding: 0.6rem 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .back-to-lessons:hover {
            background: rgba(147, 51, 234, 0.3);
        }

        #lessonVideoContainer {
            margin-bottom: 1rem;
        }

        #lessonVideoContainer iframe {
            width: 100%;
            min-height: 240px;
            border-radius: 12px;
            border: none;
        }

        .lesson-text h2 {
            margin-bottom: 0.5rem;
        }

        .lesson-text h3 {
            margin-top: 0.75rem;
            margin-bottom: 0.35rem;
        }

        .lesson-text p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .lesson-text ul,
        .lesson-text ol {
            padding-left: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .lesson-text li {
            margin-bottom: 0.3rem;
        }

        /* FOOTER */
        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
            margin-top: 0;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--purple-light);
        }

        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .courses-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .modal-body {
                grid-template-columns: 1fr;
            }

            .lesson-list {
                border-right: none;
                border-bottom: 1px solid rgba(30, 64, 175, 0.7);
                padding-right: 0;
                padding-bottom: 0.75rem;
                margin-bottom: 0.75rem;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                margin-top: 1.5rem;
            }

            .page-card {
                padding: 1.5rem;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .nav-container {
                padding-inline: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="dashboard.html" class="logo">
                <img src="ArcaneA.png" alt="Logo"> THE ARCANE ARCHIVES
            </a>
            <div class="user-avatar" id="userAvatar">?</div>
        </div>
    </nav>

    <main class="main-content">
        <a href="dashboard.html" class="back-link">← Back to dashboard</a>

        <div class="page-card">
            <div class="page-card-inner">
                <div class="page-header">
                    <h1>📚 All Courses</h1>
                    <p>Master the forbidden arts of business, wealth, and consciousness.</p>
                </div>

                <div class="courses-grid" id="coursesGrid">
                    <!-- Courses loaded by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- COURSE MODAL -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Course Title</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Lesson List View -->
                <div id="lessonListView" class="lesson-list"></div>
                
                <!-- Lesson Content View -->
                <div id="lessonContentView" class="lesson-content">
                    <button class="back-to-lessons" onclick="showLessonList()">← Back to Lessons</button>
                    <div id="lessonVideoContainer"></div>
                    <div id="lessonTextContainer" class="lesson-text"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="login.html">Login</a>
            <a href="Privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="refund-policy.html">Refund Policy</a>
        </div>
        <div class="footer-bottom">
            &copy; 2024 The Arcane Archives. All rights reserved.
        </div>
    </footer>

    <script type="module">
        import { protectPage, updateUserAvatar } from './auth-guard.js';

        protectPage({
            onSuccess: (user, userData) => {
                console.log('✅ Access granted to courses');
                updateUserAvatar(user, userData);
            }
        });

        // COURSE DATA
        const courses = [
            {
                id: 'wealth-mastery',
                icon: '💰',
                title: 'Wealth Mastery',
                description: 'Learn the ancient principles of wealth creation and financial abundance that the elite don\'t want you to know.',
                lessonsCount: 12,
                level: 'Beginner',
                lessons: [
                    {
                        number: 1,
                        title: 'The Wealth Mindset',
                        duration: '15 min',
                        videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                        content: `
                            <h2>Welcome to Wealth Mastery</h2>
                            <p>In this lesson, we'll explore the fundamental mindset shifts required to create lasting wealth.</p>
                            
                            <h3>Key Concepts:</h3>
                            <ul>
                                <li>Abundance vs. Scarcity thinking</li>
                                <li>Money as energy and exchange</li>
                                <li>Breaking limiting beliefs about wealth</li>
                                <li>The power of delayed gratification</li>
                            </ul>
                            
                            <h3>Action Steps:</h3>
                            <ol>
                                <li>Write down your current beliefs about money</li>
                                <li>Identify which beliefs are limiting you</li>
                                <li>Reframe each limiting belief into an empowering one</li>
                                <li>Set a 90-day wealth goal with clear targets</li>
                            </ol>
                        `
                    }
                ]
            },
            {
                id: 'mind-hijacking',
                icon: '🧠',
                title: 'Mind Hijacking',
                description: 'Learn how to reprogram your mind, eliminate procrastination, and lock in laser focus.',
                lessonsCount: 10,
                level: 'Intermediate',
                lessons: []
            },
            {
                id: 'copywriting-accelerator',
                icon: '✍️',
                title: 'Copywriting Accelerator',
                description: 'Turn words into money. Learn how to write messages that make people take action.',
                lessonsCount: 15,
                level: 'All Levels',
                lessons: []
            },
            {
                id: 'dating-dynamics',
                icon: '💘',
                title: 'Dating Dynamics',
                description: 'Understand attraction, polarity, and relationship power.',
                lessonsCount: 8,
                level: 'Intermediate',
                lessons: []
            },
            {
                id: 'physical-alchemy',
                icon: '💪',
                title: 'Physical Alchemy',
                description: 'Transform your body into a weapon through strength, diet, and biohacking.',
                lessonsCount: 10,
                level: 'Intermediate',
                lessons: []
            },
            {
                id: 'spiritual-laws',
                icon: '✨',
                title: 'Universal Laws',
                description: 'Master manifestation, cause & effect, and the hidden rules of reality.',
                lessonsCount: 9,
                level: 'Advanced',
                lessons: []
            }
        ];

        // Render courses
        function renderCourses() {
            const grid = document.getElementById('coursesGrid');
            grid.innerHTML = courses.map(course => `
                <div class="course-card" onclick="openCourseModal('${course.id}')">
                    <div class="course-icon">${course.icon}</div>
                    <div class="course-title">${course.title}</div>
                    <div class="course-description">${course.description}</div>
                    <div class="course-meta">
                        <span class="course-badge">${course.lessonsCount} Lessons</span>
                        <span class="course-badge">${course.level}</span>
                    </div>
                </div>
            `).join('');
        }

        // Modal controls
        window.openCourseModal = function(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;

            document.getElementById('modalTitle').textContent = course.title;

            const lessonList = document.getElementById('lessonListView');
            if (!course.lessons || course.lessons.length === 0) {
                lessonList.innerHTML = `<p style="color: var(--text-dim); font-size: 0.9rem;">Lessons for this course are coming soon.</p>`;
                document.getElementById('lessonContentView').style.display = 'none';
            } else {
                lessonList.innerHTML = course.lessons.map((lesson, index) => `
                    <div class="lesson-item ${index === 0 ? 'active' : ''}" data-course-id="${course.id}" data-lesson-number="${lesson.number}">
                        Lesson ${lesson.number}: ${lesson.title}
                    </div>
                `).join('');

                document.getElementById('lessonContentView').style.display = 'block';
                loadLesson(course, course.lessons[0]);
            }

            lessonList.addEventListener('click', (e) => {
                const item = e.target.closest('.lesson-item');
                if (!item) return;

                const number = parseInt(item.dataset.lessonNumber, 10);
                const selectedLesson = course.lessons.find(l => l.number === number);
                if (!selectedLesson) return;

                lessonList.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');

                loadLesson(course, selectedLesson);
            });

            document.getElementById('courseModal').classList.add('open');
        };

        function loadLesson(course, lesson) {
            const videoContainer = document.getElementById('lessonVideoContainer');
            const textContainer = document.getElementById('lessonTextContainer');

            if (lesson.videoUrl) {
                videoContainer.innerHTML = `<iframe src="${lesson.videoUrl}" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = '';
            }

            textContainer.innerHTML = lesson.content || `
                <h2>${lesson.title}</h2>
                <p>Lesson content will be added soon.</p>
            `;
        }

        window.closeModal = function() {
            document.getElementById('courseModal').classList.remove('open');
        };

        window.showLessonList = function() {
            const lessonListView = document.getElementById('lessonListView');
            const lessonContentView = document.getElementById('lessonContentView');

            lessonListView.style.display = 'block';
            lessonContentView.style.display = 'block';
        };

        // Init
        renderCourses();

        // Close modal on background click
        document.getElementById('courseModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });
    </script>
</body>
</html>
