<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png" />

    <style>
        :root {
            --bg-dark: #02010a;
            --bg-card: rgba(15, 23, 42, 0.96);
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --gold: #fbbf24;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
            --border-color: rgba(148, 163, 184, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #111827 0, #02010a 45%, #000 100%);
            color: var(--text-light);
            min-height: 100vh;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 40;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: var(--purple-light);
            border-color: rgba(147, 51, 234, 0.8);
            transform: translateX(-2px);
        }

        /* Header */
        .header {
            max-width: 1200px;
            margin: 2.5rem auto 0;
            padding: 1.5rem 1.5rem 0.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .logo img {
            height: 32px;
            width: 32px;
        }

        /* Main content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto 4rem;
            padding: 0 1.5rem;
        }

        .page-card {
            margin-top: 1.5rem;
            background: radial-gradient(circle at top, rgba(147, 51, 234, 0.12), rgba(15, 23, 42, 0.98));
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            box-shadow: 0 30px 120px rgba(15, 23, 42, 0.85), 0 0 40px rgba(147, 51, 234, 0.25);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .page-card-inner {
            position: relative;
            z-index: 1;
        }

        .page-header-eyebrow {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--text-dim);
            margin-bottom: 0.35rem;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 0.4rem;
        }

        .page-header h1 span {
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 0.96rem;
            margin-bottom: 1.5rem;
        }

        /* Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.6rem;
        }

        .course-card {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            padding: 1.3rem 1.5rem;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .course-card:hover {
            transform: translateY(-3px);
            border-color: rgba(147, 51, 234, 0.8);
            box-shadow: 0 20px 50px rgba(147, 51, 234, 0.3);
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--purple-light);
        }

        .course-description {
            font-size: 0.88rem;
            color: var(--text-dim);
        }

        /* Footer */
        footer {
            background: rgba(5,5,5,0.95);
            padding: 2rem;
            border-top: 1px solid rgba(147, 51, 234, 0.25);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: var(--purple-light);
        }

        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .back-btn {
                position: static;
                display: block;
                margin: 1rem auto 0;
                width: fit-content;
            }
            .header {
                padding-inline: 1rem;
            }
            .main-content {
                padding-inline: 1rem;
            }
            .page-card {
                padding: 1.5rem 1.25rem;
            }
        }
    </style>
</head>

<body>

    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div class="header">
        <div class="logo">
            <img src="ArcaneA.png" alt="Logo">
            THE ARCANE ARCHIVES
        </div>
    </div>

    <div class="main-content">
        <div class="page-card">
            <div class="page-card-inner">

                <div class="page-header">
                    <div class="page-header-eyebrow">Full Curriculum</div>
                    <h1>📚 <span>Your Courses</span></h1>
                    <p>Every piece of knowledge you need to escape the system and build your empire.</p>
                </div>

                <div class="courses-grid" id="coursesGrid">
                    <div style="text-align:center; padding:2rem 0; color:var(--text-dim);">
                        Loading courses...
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="Privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="refund-policy.html">Refund Policy</a>
        </div>
        <div class="footer-bottom">
            © 2024 The Arcane Archives. All rights reserved.
        </div>
    </footer>

    <script type="module">
        import { protectPage } from "./auth-guard.js";

        protectPage({
            onSuccess: (u, d) => loadCourses(),
            onFailure: () => {
                document.getElementById("coursesGrid").innerHTML = `
                <div style="text-align:center; padding:3rem 1rem;">
                    <div style="font-size:3rem; margin-bottom:1rem;">🔒</div>
                    <h3>Access Restricted</h3>
                    <p style="color:#9ca3af; margin:1rem 0;">
                        You need an active subscription to view the course library.
                    </p>
                    <a href="index.html#pricing" style="
                        display:inline-block;
                        padding:0.8rem 1.6rem;
                        border-radius:999px;
                        background:linear-gradient(135deg,#9333ea,#7e22ce);
                        color:white;
                        text-decoration:none;
                        font-weight:600;
                    ">Join The Arcane Archives</a>
                </div>`;
            }
        });

        function loadCourses() {
            const list = document.getElementById("coursesGrid");

            const courses = [
                "Productive Isolation",
                "Top-Performance",
                "LG Philosophies",
                "Escape in Hell",
                "Copywriting Accelerator",
                "Mind Hijacking",
                "30-Day Build a Profitable Business",
                "Make a Product & Print Cash",
                "Inbound Method",
                "Entrepreneurship Mastery",
                "Mindset Mastery",
                "Biohacking Protocol",
                "Leadership Protocol",
                "Rules for Life",
                "Sales Mastery",
                "Investing Guide",
                "Discipline Protocol",
                "Stoicism Course",
                "Thinking Course",
                "Daily Quests",
                "Trading Mastery",
                "AI / Human Behaviour Vault"
            ];

            list.innerHTML = courses.map(c => `
                <div class="course-card">
                    <div class="course-title">${c}</div>
                    <div class="course-description">
                        Tap to study → Master this → Apply it → Level up.
                    </div>
                </div>
            `).join("");
        }
    </script>

</body>
</html>
