<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Successful | The Arcane Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background: #05030b;
      color: #f8f4ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      padding: 32px 28px;
      background: radial-gradient(circle at top, #3b16ff22, #05030b 60%);
      border: 1px solid #7b5cff44;
      box-shadow: 0 18px 45px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      margin: 6px 0;
      line-height: 1.5;
    }
    #payment-status {
      margin-top: 16px;
      font-weight: 600;
      color: #c2a3ff;
    }
    .btn {
      margin-top: 24px;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #a67bff;
      color: #05030b;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔥 Payment Successful</h1>
    <p>Thank you for joining <strong>The Arcane Archives</strong>.</p>
    <p>We’re just finishing your account activation…</p>

    <p id="payment-status">Verifying your payment...</p>

    <a href="/dashboard.html" class="btn" id="dashboard-link" style="display:none;">
      Go to your Dashboard
    </a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    // TODO: 🔥 Replace this with your real Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusEl = document.getElementById("payment-status");
    const dashLink = document.getElementById("dashboard-link");

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
      console.log(msg);
    }

    // 1) Get session_id from URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    if (!sessionId) {
      setStatus("Missing session ID in URL. If you paid and see this, contact support.");
    }

    // 2) Wait for Firebase Auth user
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        setStatus("Please log in again to complete activation.");
        return;
      }

      if (!sessionId) return;

      try {
        // 3) Call Netlify verify function to check payment
        const res = await fetch("/.netlify/functions/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error("Verify error:", data);
          setStatus("There was an issue verifying your payment. If you were charged, contact support.");
          return;
        }

        const paid =
          data.payment_status === "paid" ||
          data.status === "complete";

        if (!paid) {
          setStatus("Payment not completed yet. If you were charged, contact support.");
          return;
        }

        // 4) Mark user as paid in Firestore
        await setDoc(
          doc(db, "users", user.uid),
          {
            isPaid: true,
            subscriptionStatus: "active",
            stripeCustomerId: data.customer || null,
            stripeSubscriptionId: data.subscription || null,
          },
          { merge: true }
        );

        setStatus("Your account has been activated. Welcome to The Arcane Archives 🔮");
        dashLink.style.display = "inline-block";

      } catch (err) {
        console.error(err);
        setStatus("Unexpected error verifying your payment. If this persists, contact support.");
      }
    });
  </script>
</body>
</html>
