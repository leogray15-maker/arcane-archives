<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Successful | The Arcane Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background: #05030b;
      color: #f8f4ff;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      padding: 32px 28px;
      background: radial-gradient(circle at top, #3b16ff22, #05030b 60%);
      border: 1px solid #7b5cff44;
      box-shadow: 0 18px 45px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      margin: 6px 0;
      line-height: 1.5;
    }
    #payment-status {
      margin-top: 16px;
      font-weight: 600;
      color: #c2a3ff;
      min-height: 1.4em;
    }
    .btn {
      margin-top: 18px;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #a67bff;
      color: #05030b;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-secondary {
      background: transparent;
      color: #a67bff;
      border: 1px solid #a67bff99;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔥 Payment Successful</h1>
    <p>Thank you for joining <strong>The Arcane Archives</strong>.</p>
    <p>We’re finishing your account activation…</p>

    <p id="payment-status">Verifying your payment...</p>

    <a href="/dashboard.html" class="btn" id="dashboard-link" style="display:none;">
      Go to your Dashboard
    </a>

    <!-- "Click here to log in" button -->
    <a href="/login.html" class="btn btn-secondary" id="login-link" style="display:none;">
      Click here to log in
    </a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    // 🔥 Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w",
      authDomain: "arcane-archives-3b0f5.firebaseapp.com",
      projectId: "arcane-archives-3b0f5",
      storageBucket: "arcane-archives-3b0f5.firebasestorage.app",
      messagingSenderId: "264237235055",
      appId: "1:264237235055:web:4a2e5605b0ffb5307f069a",
      measurementId: "G-YGPLQHDXMM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusEl = document.getElementById("payment-status");
    const dashLink = document.getElementById("dashboard-link");
    const loginLink = document.getElementById("login-link");

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
      console.log("[SUCCESS PAGE]", msg);
    }

    // 1) Get session_id from URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    if (!sessionId) {
      setStatus("Missing session ID in URL. If you were charged and see this, contact support.");
    } else {
      // store in case user logs in after
      try {
        localStorage.setItem("aa_last_session_id", sessionId);
      } catch (e) {
        console.warn("Could not store session id in localStorage", e);
      }
    }

    // 2) Wait for Firebase Auth user
    onAuthStateChanged(auth, async (user) => {
      // Not logged in? -> show login button with message
      if (!user) {
        setStatus("To complete activation, please log in to your account.");
        loginLink.style.display = "inline-block";
        return;
      }

      // Logged in but no sessionId? Use last stored one
      let sid = sessionId;
      if (!sid) {
        try {
          sid = localStorage.getItem("aa_last_session_id");
        } catch (e) {
          console.warn("Could not read session id from storage", e);
        }
      }

      if (!sid) {
        setStatus("No payment session found. If you were charged, contact support.");
        return;
      }

      try {
        // 3) Call Netlify verify function
        const res = await fetch("/.netlify/functions/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: sid }),
        });

        const data = await res.json();

        if (!res.ok) {
          console.error("Verify error:", data);
          setStatus("There was an issue verifying your payment. If you were charged, contact support.");
          return;
        }

        const paid =
          data.payment_status === "paid" ||
          data.status === "complete";

        if (!paid) {
          setStatus("Payment not completed yet. If you were charged, contact support.");
          return;
        }

        // 4) Mark user as paid in Firestore (👉 CORRECT COLLECTION: 'Users')
        await setDoc(
          doc(db, "Users", user.uid),
          {
            isPaid: true,
            subscriptionStatus: "active",
            stripeCustomerId: data.customer || null,
            stripeSubscriptionId: data.subscription || null,
          },
          { merge: true }
        );

        setStatus("Your account has been activated. Welcome to The Arcane Archives 🔮");
        dashLink.style.display = "inline-block";

        try {
          localStorage.removeItem("aa_last_session_id");
        } catch (e) {}
      } catch (err) {
        console.error(err);
        setStatus("Unexpected error verifying your payment. If this persists, contact support.");
      }
    });
  </script>
</body>
</html>
