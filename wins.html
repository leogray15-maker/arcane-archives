<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wins Board | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
        }
        .nav-container {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px; font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex; align-items: center; gap: 12px;
        }
        .logo img { height: 40px; width: auto; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem;
        }
        .menu-toggle {
            display: none; background: none; border: none;
            font-size: 1.5rem; color: var(--text-light); cursor: pointer;
        }
        .sidebar {
            position: fixed; left: 0; top: 70px; width: 250px;
            height: calc(100vh - 70px);
            background: var(--bg-darker);
            border-right: 1px solid rgba(147, 51, 234, 0.2);
            padding: 2rem 0; overflow-y: auto;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu a {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 2rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }
        .sidebar-menu a:hover {
            background: rgba(147, 51, 234, 0.1);
            color: var(--purple-light);
        }
        .sidebar-menu a.active {
            background: rgba(147, 51, 234, 0.2);
            color: var(--purple-light);
            border-left: 3px solid var(--purple);
        }
        .main-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 3rem;
            min-height: calc(100vh - 70px);
        }
        .page-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .page-header p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 2rem; }
        .post-win-section {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
        }
        .post-win-section h2 { color: var(--purple-light); margin-bottom: 1rem; }
        .win-input {
            width: 100%; padding: 1rem;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: inherit;
            min-height: 120px;
            resize: vertical;
            margin-bottom: 1rem;
        }
        .win-input:focus { outline: none; border-color: var(--purple); }
        .post-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .post-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(147, 51, 234, 0.4); }
        .wins-container { display: flex; flex-direction: column; gap: 1.5rem; }
        .win-card {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .win-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .win-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .win-username { font-weight: 700; color: var(--purple-light); }
        .win-time { color: var(--text-dim); font-size: 0.9rem; }
        .win-content { color: var(--text-light); line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap; }
        .like-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .like-btn:hover { background: rgba(147, 51, 234, 0.2); transform: scale(1.05); }
        .like-btn.liked { background: var(--purple); border-color: var(--purple); color: white; }
        .loading { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) {
            .sidebar { left: -250px; transition: left 0.3s; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 2rem 1rem; }
            .menu-toggle { display: block; }
        }
    
        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .footer-links a:hover {
            color: var(--purple-light);
        }
        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <a href="dashboard.html" class="logo"><img src="ArcaneA.png" alt="Logo"> THE ARCANE ARCHIVES</a>
            <div class="user-avatar" id="userAvatar">?</div>
        </div>
    </nav>
    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="courses.html">📚 All Courses</a></li>
            <li><a href="community.html">💬 Community</a></li>
            <li><a href="live-calls.html">🎙️ Live Calls</a></li>
            <li><a href="wins.html" class="active">🏆 Wins Board</a></li>
            <li><a href="settings.html">⚙️ Settings</a></li>
        </ul>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h1>🏆 Wins Board</h1>
            <p>Celebrate your victories with the brotherhood</p>
        </div>
        <div class="post-win-section">
            <h2>Share Your Win 🎉</h2>
            <textarea id="winInput" class="win-input" placeholder="What did you accomplish today?

Examples:
- Made my first $1000 online
- Hit a new PR at the gym
- Had a great date"></textarea>
            <button id="postWinBtn" class="post-btn">📢 Post Win</button>
        </div>
        <div id="winsContainer" class="wins-container">
            <div class="loading">⏳ Loading wins...</div>
        </div>
    </main>

<script type="module">
// wins.html - Complete Script Section
import { protectPage, updateUserAvatar, setupMobileMenu, db } from './auth-guard.js';
import { 
    collection, 
    addDoc, 
    query, 
    orderBy, 
    limit, 
    onSnapshot,
    serverTimestamp,
    doc,
    updateDoc,
    arrayUnion,
    arrayRemove
} from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';
import { awardXP } from './xp-system.js';

let currentUser = null;
let currentUserData = null;

protectPage({
    onSuccess: (user, userData) => {
        console.log('✅ Wins page - Access granted');
        currentUser = user;
        currentUserData = userData;
        updateUserAvatar(user, userData);
        loadWins();
    },
    onFailure: (error) => {
        console.error('❌ Wins page - Access denied:', error);
        const winsContainer = document.getElementById('winsContainer');
        if (winsContainer) {
            winsContainer.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: #ef4444;">
                    <p>⚠️ Access denied: ${error}</p>
                    <p style="font-size: 0.9rem; margin-top: 1rem;">Please log in to view wins.</p>
                    <a href="login.html" style="display: inline-block; margin-top: 1rem; padding: 0.8rem 1.5rem; background: var(--purple); color: white; text-decoration: none; border-radius: 8px;">Go to Login</a>
                </div>
            `;
        }
    }
});

setupMobileMenu();

// ============================================
// LOAD WINS FROM FIRESTORE
// ============================================
function loadWins() {
    const winsContainer = document.getElementById('winsContainer');
    
    console.log('📥 Loading wins from Firestore...');
    
    const q = query(
        collection(db, 'wins'),
        orderBy('timestamp', 'desc'),
        limit(50)
    );

    onSnapshot(q, (snapshot) => {
        console.log('📊 Wins snapshot received, size:', snapshot.size);
        
        if (snapshot.empty) {
            winsContainer.innerHTML = `
                <div style="text-align: center; padding: 4rem 2rem; color: var(--text-dim);">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">🏆</div>
                    <p>No wins posted yet. Be the first to share your victory!</p>
                </div>
            `;
            return;
        }

        winsContainer.innerHTML = '';
        
        snapshot.forEach((docSnap) => {
            const win = { id: docSnap.id, ...docSnap.data() };
            const winCard = createWinCard(win);
            winsContainer.appendChild(winCard);
        });
        
        console.log('✅ Wins loaded successfully');
    }, (error) => {
        console.error('❌ Error loading wins:', error);
        winsContainer.innerHTML = `
            <div style="text-align: center; padding: 2rem; color: #ef4444;">
                <p>⚠️ Error loading wins: ${error.message}</p>
                <p style="font-size: 0.9rem; margin-top: 1rem;">Check browser console for details.</p>
            </div>
        `;
    });
}

// ============================================
// CREATE WIN CARD ELEMENT
// ============================================
function createWinCard(win) {
    const card = document.createElement('div');
    card.className = 'win-card';
    
    const timestamp = win.timestamp?.toDate();
    const timeAgo = timestamp ? formatTimeAgo(timestamp) : 'Just now';
    const username = win.username || 'Anonymous';
    const likes = win.likes || [];
    const likeCount = likes.length;
    const isLiked = currentUser && likes.includes(currentUser.uid);

    // Check if avatar is a URL (custom picture) or emoji/letter
    const isCustomPicture = win.avatarUrl && win.avatarUrl.startsWith('data:image');
    const avatarDisplay = isCustomPicture 
        ? `<div class="win-avatar" style="background-image: url(${win.avatarUrl}); background-size: cover; background-position: center;"></div>`
        : `<div class="win-avatar">${escapeHtml(win.avatar || username.charAt(0).toUpperCase())}</div>`;

    card.innerHTML = `
        <div class="win-header">
            ${avatarDisplay}
            <div style="flex: 1;">
                <div class="win-username">${escapeHtml(username)}</div>
                <div class="win-time">${timeAgo}</div>
            </div>
        </div>
        <div class="win-content">${escapeHtml(win.content)}</div>
        <button class="like-btn ${isLiked ? 'liked' : ''}" data-win-id="${win.id}">
            ${isLiked ? '❤️' : '🤍'} ${likeCount} ${likeCount === 1 ? 'Like' : 'Likes'}
        </button>
    `;

    const likeBtn = card.querySelector('.like-btn');
    likeBtn.addEventListener('click', () => toggleLike(win.id, isLiked));

    return card;
}

// ============================================
// POST A NEW WIN  +  XP
// ============================================
async function postWin() {
    const input = document.getElementById('winInput');
    const content = input.value.trim();

    if (!content) {
        alert('⚠️ Please write your win before posting!');
        return;
    }

    if (!currentUser || !currentUserData) {
        alert('⚠️ Please log in to post wins');
        return;
    }

    const postBtn = document.getElementById('postWinBtn');
    postBtn.disabled = true;
    postBtn.textContent = '📤 Posting...';

    try {
        console.log('📤 Posting win...');
        
        const username = currentUserData.Username || currentUser.displayName || currentUser.email.split('@')[0];
        const avatar = localStorage.getItem('userAvatar') || username.charAt(0).toUpperCase();
        const customAvatarUrl = localStorage.getItem('customAvatarUrl') || null;

        await addDoc(collection(db, 'wins'), {
            content: content,
            username: username,
            avatar: avatar,
            avatarUrl: customAvatarUrl,
            userId: currentUser.uid,
            timestamp: serverTimestamp(),
            likes: []
        });

        console.log('✅ Win posted successfully');
        input.value = '';
        alert('🎉 Win posted successfully!');

        // Update user's WinsPosted count
        try {
            const newWinsPosted = (currentUserData.WinsPosted || 0) + 1;
            await updateDoc(doc(db, 'Users', currentUser.uid), {
                WinsPosted: newWinsPosted
            });
            currentUserData.WinsPosted = newWinsPosted;
            console.log('✅ Updated user WinsPosted count');
        } catch (updateError) {
            console.warn('Could not update WinsPosted count:', updateError);
        }

        // 🔥 Give XP for posting a win
        await awardXP(currentUser.uid, 'win_posted');

    } catch (error) {
        console.error('❌ Error posting win:', error);
        alert('⚠️ Error posting win: ' + error.message);
    } finally {
        postBtn.disabled = false;
        postBtn.textContent = '📢 Post Win';
    }
}

// ============================================
// TOGGLE LIKE
// ============================================
async function toggleLike(winId, isCurrentlyLiked) {
    if (!currentUser) {
        alert('⚠️ Please log in to like wins');
        return;
    }

    try {
        const winRef = doc(db, 'wins', winId);

        if (isCurrentlyLiked) {
            await updateDoc(winRef, {
                likes: arrayRemove(currentUser.uid)
            });
        } else {
            await updateDoc(winRef, {
                likes: arrayUnion(currentUser.uid)
            });
        }
    } catch (error) {
        console.error('Error updating like:', error);
    }
}

// ============================================
// HELPERS
// ============================================
function formatTimeAgo(date) {
    const seconds = Math.floor((new Date() - date) / 1000);
    
    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
    return date.toLocaleDateString();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Hook up button
document.getElementById('postWinBtn').addEventListener('click', postWin);
</script>

</body>
</html>
