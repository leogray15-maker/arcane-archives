<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wins Board | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
        }
        .nav-container {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px; font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex; align-items: center; gap: 12px;
        }
        .logo img { height: 40px; width: auto; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem;
        }
        .menu-toggle {
            display: none; background: none; border: none;
            font-size: 1.5rem; color: var(--text-light); cursor: pointer;
        }
        .sidebar {
            position: fixed; left: 0; top: 70px; width: 250px;
            height: calc(100vh - 70px);
            background: var(--bg-darker);
            border-right: 1px solid rgba(147, 51, 234, 0.2);
            padding: 2rem 0; overflow-y: auto;
        }
        .sidebar-menu { list-style: none; }
        .sidebar-menu a {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 2rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }
        .sidebar-menu a:hover {
            background: rgba(147, 51, 234, 0.1);
            color: var(--purple-light);
        }
        .sidebar-menu a.active {
            background: rgba(147, 51, 234, 0.2);
            color: var(--purple-light);
            border-left: 3px solid var(--purple);
        }
        .main-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 3rem;
            min-height: calc(100vh - 70px);
        }
        .page-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .page-header p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 2rem; }
        .post-win-section {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
        }
        .post-win-section h2 { color: var(--purple-light); margin-bottom: 1rem; }
        .win-input {
            width: 100%; padding: 1rem;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: inherit;
            min-height: 120px;
            resize: vertical;
            margin-bottom: 1rem;
        }
        .win-input:focus { outline: none; border-color: var(--purple); }
        .post-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .post-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(147, 51, 234, 0.4); }
        .wins-container { display: flex; flex-direction: column; gap: 1.5rem; }
        .win-card {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .win-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .win-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .win-username { font-weight: 700; color: var(--purple-light); }
        .win-time { color: var(--text-dim); font-size: 0.9rem; }
        .win-content { color: var(--text-light); line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap; }
        .like-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .like-btn:hover { background: rgba(147, 51, 234, 0.2); transform: scale(1.05); }
        .like-btn.liked { background: var(--purple); border-color: var(--purple); color: white; }
        .loading { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) {
            .sidebar { left: -250px; transition: left 0.3s; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 2rem 1rem; }
            .menu-toggle { display: block; }
        }
    
        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .footer-links a:hover {
            color: var(--purple-light);
        }
        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loadingScreen" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    transition: opacity 0.5s, visibility 0.5s;
">
    <img src="ArcaneA.png" alt="The Arcane Archives" style="width: 150px; height: 150px; margin-bottom: 3rem; animation: logoPulse 2s ease-in-out infinite;">
    
    <div style="width: 300px; max-width: 90%; margin-bottom: 1rem;">
        <div style="
            width: 100%;
            height: 6px;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 10px;
            overflow: hidden;
        ">
            <div id="loadingBar" style="
                width: 0%;
                height: 100%;
                background: linear-gradient(90deg, #9333ea, #a78bfa);
                border-radius: 10px;
                transition: width 0.3s ease;
            "></div>
        </div>
    </div>
    
    <div id="loadingText" style="
        color: #a78bfa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        min-height: 30px;
        text-align: center;
    ">Unlocking the archives...</div>
</div>

<style>
@keyframes logoPulse {
    0%, 100% {
        transform: scale(1);
        opacity: 1;
    }
    50% {
        transform: scale(1.05);
        opacity: 0.8;
    }
}
</style>

<script>
// Enhanced loading screen with rotating messages
(function() {
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingBar = document.getElementById('loadingBar');
    const loadingText = document.getElementById('loadingText');
    
    const messages = [
        'Unlocking the archives...',
        'Preparing your journey...',
        'Keep this a secret...',
        'Loading forbidden knowledge...',
        'Initializing consciousness shift...',
        'Breaking the matrix...'
    ];
    
    let progress = 0;
    let messageIndex = 0;
    
    // Rotate messages
    const messageInterval = setInterval(() => {
        messageIndex = (messageIndex + 1) % messages.length;
        loadingText.textContent = messages[messageIndex];
    }, 800);
    
    // Progress bar
    const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            clearInterval(messageInterval);
            loadingText.textContent = 'Welcome to the archives...';
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }, 300);
        }
        loadingBar.style.width = progress + '%';
    }, 200);
    
    // Ensure loading completes
    window.addEventListener('load', () => {
        setTimeout(() => {
            progress = 100;
            clearInterval(interval);
            clearInterval(messageInterval);
            loadingBar.style.width = '100%';
            loadingText.textContent = 'Welcome to the archives...';
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }, 300);
        }, 500);
    });
})();
</script>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const app = initializeApp({
        apiKey: "AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w",
        authDomain: "arcane-archives-3b0f5.firebaseapp.com",
        projectId: "arcane-archives-3b0f5",
        storageBucket: "arcane-archives-3b0f5.firebasestorage.app",
        messagingSenderId: "264237235055",
        appId: "1:264237235055:web:4a2e5605b0ffb5307f069a"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            
            if (!userDoc.exists() || userDoc.data().subscriptionStatus !== 'active') {
                alert('🔒 Payment required to access The Arcane Archives.');
                window.location.href = 'index.html#pricing';
                return;
            }

            console.log('✅ Access granted');
            
            // Update avatar
            const username = user.displayName || user.email.split('@')[0];
            const userAvatarElement = document.getElementById('userAvatar');
            if (userAvatarElement) {
                const avatar = localStorage.getItem('userAvatar') || username.charAt(0).toUpperCase();
                userAvatarElement.textContent = avatar;
                
                const customAvatar = localStorage.getItem('customAvatarUrl');
                if (customAvatar) {
                    userAvatarElement.style.backgroundImage = `url(${customAvatar})`;
                    userAvatarElement.style.backgroundSize = 'cover';
                    userAvatarElement.style.backgroundPosition = 'center';
                    userAvatarElement.textContent = '';
                }
            }

        } catch (error) {
            console.error('Auth error:', error);
            window.location.href = 'index.html#pricing';
        }
    });
</script>
