[build]
  publish   = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false

[[headers]]
  for = "/*"
  [headers.values]
    # Allow Stripe, Firebase, Firestore, gstatic etc
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://js.stripe.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.firebaseapp.com https://*.googleapis.com https://firestore.googleapis.com https://*.stripe.com https://www.gstatic.com; font-src 'self' data:; frame-src https://js.stripe.com;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
