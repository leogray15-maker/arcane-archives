# ==============================
# Netlify Configuration
# The Arcane Archives
# ==============================

[build]
  publish = "."
  command = "echo 'No build required'"
  functions = "netlify/functions"

# ==============================
# Redirects
# ==============================

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

# ==============================
# Global Security Headers
# ==============================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ==============================
# LOGIN PAGE
# ==============================

[[headers]]
  for = "/login.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://*.firebaseapp.com https://*.googleapis.com https://accounts.google.com https://identitytoolkit.googleapis.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-src https://accounts.google.com; worker-src 'self' blob:;"

# ==============================
# ALERTS PAGE - TradingView JavaScript Widget (THE WORKING ONE)
# ==============================

[[headers]]
  for = "/alerts.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://s3.tradingview.com https://www.gstatic.com https://*.firebaseapp.com https://*.googleapis.com https://*.firebaseio.com; connect-src 'self' https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://*.cloudfunctions.net https://*.netlify.app https://fcm.googleapis.com wss://*.firebaseio.com https://s3.tradingview.com https://*.tradingview.com https://data.tradingview.com wss://*.tradingview.com https://prodata.tradingview.com https://widgetdata.tradingview.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https://s3.tradingview.com; frame-src 'self' https://s3.tradingview.com https://*.tradingview.com; worker-src 'self' blob:; child-src 'self' blob:; media-src 'self' https: blob:;"

