# ==============================
# Netlify Configuration
# The Arcane Archives
# NO CSP - Allow Everything
# ==============================

[build]
  publish = "."
  functions = "netlify/functions"

[functions."consulting-agent"]
  timeout = 26

# ==============================
# Redirects
# ==============================

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

# ── API Proxies (bypass CORS) ──────────────────────────────
[[redirects]]
  from = "/api/metals/*"
  to = "https://metals.live/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/coingecko/*"
  to = "https://api.coingecko.com/api/v3/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/fx/*"
  to = "https://open.er-api.com/v6/:splat"
  status = 200
  force = true

# ==============================
# Global Security Headers (Basic Only)
# ==============================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"