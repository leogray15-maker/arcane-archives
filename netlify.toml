# ==============================
# Netlify Configuration
# The Arcane Archives
# ==============================

[build]
  publish = "."
  command = "echo 'No build required'"
  functions = "netlify/functions"

# ==============================
# Redirects
# ==============================

# Root path → index.html
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# (Optional helpers – keep or delete if you like)
[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

# ==============================
# Global Security Headers
# ==============================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ==============================
# Page-Specific CSP Headers
# ==============================

# Alerts Page (TradingView + Firebase)
[[headers]]
  for = "/alerts.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://s3.tradingview.com https://www.gstatic.com https://*.firebaseapp.com https://*.googleapis.com https://*.firebaseio.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://*.cloudfunctions.net https://*.netlify.app https://fcm.googleapis.com https://www.gstatic.com https://s3.tradingview.com https://data.tradingview.com https://prodata.tradingview.com https://widgetdata.tradingview.com wss://*.firebaseio.com wss://*.tradingview.com; style-src 'self' 'unsafe-inline' https://s3.tradingview.com; img-src 'self' data: https: blob:; font-src 'self' data:; frame-src 'self' https://*.tradingview.com; worker-src 'self' blob:; child-src 'self' https://*.tradingview.com blob:; media-src 'self' https: blob:;"

