   /* Arcane Archives Universal Styling */
:root {
    --bg-dark: #02010a;
    --bg-card: rgba(15, 23, 42, 0.96);
    --purple: #9333ea;
    --purple-dark: #7e22ce;
    --purple-light: #a78bfa;
    --gold: #fbbf24;
    --text-light: #e5e5e5;
    --text-dim: #a3a3a3;
    --border-color: rgba(148, 163, 184, 0.5);
}

/* Override Notion's default white background */
html, body {
    background: radial-gradient(circle at top, #111827 0, #02010a 45%, #000 100%) !important;
    color: var(--text-light) !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    min-height: 100vh;
    margin: 0;
    padding: 0;
}

/* Back to Archives button */
.arcane-back-btn {
    position: fixed;
    top: 1.5rem;
    left: 1.5rem;
    z-index: 1000;
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(15, 23, 42, 0.9);
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    backdrop-filter: blur(12px);
    transition: all 0.2s ease;
}

.arcane-back-btn:hover {
    color: var(--purple-light);
    border-color: rgba(147, 51, 234, 0.8);
    transform: translateX(-2px);
}

/* Main content container */
.page, article {
    max-width: 900px;
    margin: 4rem auto;
    padding: 2rem;
    background: radial-gradient(circle at top, rgba(147, 51, 234, 0.12), rgba(15, 23, 42, 0.98));
    border-radius: 24px;
    border: 1px solid rgba(148, 163, 184, 0.5);
    box-shadow: 0 30px 120px rgba(15, 23, 42, 0.85);
}

/* Course title */
h1, .page-title {
    font-size: 2.2rem !important;
    color: var(--text-light) !important;
    margin-bottom: 1.5rem !important;
    background: linear-gradient(135deg, var(--purple-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Course icon */
.page-header-icon {
    font-size: 3rem !important;
    margin-bottom: 1rem;
}

/* Sub-module links */
a {
    color: var(--purple-light) !important;
    text-decoration: none !important;
    transition: all 0.2s;
}

a:hover {
    color: var(--gold) !important;
    text-decoration: underline !important;
}

/* Module links styling */
figure a, .link-to-page a {
    display: block;
    padding: 1rem 1.2rem;
    margin: 0.8rem 0;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(148, 163, 184, 0.5);
    border-radius: 12px;
    color: var(--text-light) !important;
    transition: all 0.2s;
}

figure a:hover, .link-to-page a:hover {
    border-color: rgba(147, 51, 234, 0.9);
    background: radial-gradient(circle at top left, rgba(147, 51, 234, 0.25), rgba(15, 23, 42, 0.98));
    transform: translateX(4px);
    text-decoration: none !important;
}

/* Text styling */
p {
    color: var(--text-light) !important;
    line-height: 1.7;
    margin: 1rem 0;
}

/* Headers */
h2, h3, h4, h5, h6 {
    color: var(--text-light) !important;
    margin-top: 2rem;
    margin-bottom: 1rem;
}

h2 { font-size: 1.7rem !important; }
h3 { font-size: 1.4rem !important; }
h4 { font-size: 1.2rem !important; }

/* Lists */
ul, ol {
    color: var(--text-light) !important;
    padding-left: 1.5rem;
}

li {
    color: var(--text-light) !important;
    margin: 0.5rem 0;
}

/* Code blocks */
code, pre {
    background: rgba(15, 23, 42, 0.95) !important;
    border: 1px solid rgba(148, 163, 184, 0.3) !important;
    color: var(--purple-light) !important;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
}

pre {
    padding: 1rem !important;
    overflow-x: auto;
}

/* Dividers */
hr {
    border: none;
    border-top: 1px solid rgba(148, 163, 184, 0.3);
    margin: 2rem 0;
}

/* Blockquotes */
blockquote {
    border-left: 3px solid var(--purple);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    color: var(--text-dim) !important;
    font-style: italic;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
}

th, td {
    padding: 0.8rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    color: var(--text-light) !important;
}

th {
    background: rgba(147, 51, 234, 0.2);
    font-weight: 600;
}

/* Images */
img {
    max-width: 100%;
    border-radius: 12px;
    margin: 1.5rem 0;
}

/* Mobile responsiveness */
@media (max-width: 768px) {
    .page, article {
        margin: 1.5rem 0.8rem;
        padding: 1.3rem;
    }

    .arcane-back-btn {
        position: static;
        display: block;
        margin: 1rem auto;
        width: fit-content;
    }

    h1, .page-title {
        font-size: 1.5rem !important;
    }

    h2 { font-size: 1.3rem !important; }
    h3 { font-size: 1.1rem !important; }
    h4 { font-size: 1rem !important; }

    figure a, .link-to-page a {
        padding: 0.8rem 1rem;
        font-size: 0.9rem;
    }

    .page-header-icon {
        font-size: 2rem !important;
    }

    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }

    th, td {
        padding: 0.6rem;
        font-size: 0.85rem;
    }

    pre {
        padding: 0.8rem !important;
        font-size: 0.85rem;
        overflow-x: auto;
    }
}

@media (max-width: 480px) {
    .page, article {
        margin: 1rem 0.5rem;
        padding: 1rem;
    }

    h1, .page-title {
        font-size: 1.3rem !important;
    }

    figure a, .link-to-page a {
        padding: 0.7rem 0.8rem;
        font-size: 0.85rem;
    }

    .arcane-back-btn {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
    }
}
  </style>
