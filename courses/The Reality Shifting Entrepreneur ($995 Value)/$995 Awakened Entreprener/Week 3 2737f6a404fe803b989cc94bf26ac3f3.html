:root {

}

html, body {

.arcane-back-btn {

    align-items: center;
    gap: 0.5rem;
    backdrop-filter: blur(12px);
    transition: all 0.2s ease;
}

.arcane-back-btn:hover {
    color: var(--purple-light);
    border-color: rgba(147, 51, 234, 0.8);
    transform: translateX(-2px);
}

.page, article, body > div {
    max-width: 900px;
    margin: 4rem auto;
    padding: 2rem;
    background: radial-gradient(circle at top, rgba(147, 51, 234, 0.12), rgba(15, 23, 42, 0.98));
    border-radius: 24px;
    border: 1px solid rgba(148, 163, 184, 0.5);
    box-shadow: 0 30px 120px rgba(15, 23, 42, 0.85);
}

h1, .page-title {
    font-size: 2.2rem !important;
    color: var(--text-light) !important;
    margin-bottom: 1.5rem !important;
    background: linear-gradient(135deg, var(--purple-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

a {
    color: var(--purple-light) !important;
    text-decoration: none !important;
    transition: all 0.2s;
}

a:hover {
    color: var(--gold) !important;
}

figure a, .link-to-page a, ul li a {
    display: block;
    padding: 1rem 1.2rem;
    margin: 0.8rem 0;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(148, 163, 184, 0.5);
    border-radius: 12px;
    color: var(--text-light) !important;
    transition: all 0.2s;
}

figure a:hover, .link-to-page a:hover, ul li a:hover {
    border-color: rgba(147, 51, 234, 0.9);
    background: radial-gradient(circle at top left, rgba(147, 51, 234, 0.25), rgba(15, 23, 42, 0.98));
    transform: translateX(4px);
}

p, li, td {
    color: var(--text-light) !important;
    line-height: 1.7;
}

h2, h3, h4, h5, h6 {
    color: var(--text-light) !important;
    margin-top: 2rem;
    margin-bottom: 1rem;
}

img {
    max-width: 100%;
    border-radius: 12px;
    margin: 1.5rem 0;
}

iframe, video, embed {
    max-width: 100%;
    border-radius: 12px;
    margin: 1.5rem 0;
    border: 1px solid rgba(148, 163, 184, 0.3);
}

code, pre {
    background: rgba(15, 23, 42, 0.95) !important;
    border: 1px solid rgba(148, 163, 184, 0.3) !important;
    color: var(--purple-light) !important;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
}

@media (max-width: 768px) {
    .page, article, body > div {
        margin: 1.5rem 0.8rem;
        padding: 1.3rem;
    }
    
    .arcane-back-btn {
        position: static;
        display: block;
        margin: 1rem auto;
        width: fit-content;
    }
    
    h1 { font-size: 1.5rem !important; }
}
