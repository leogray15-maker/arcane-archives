   /* Arcane Archives Universal Styling */
:root {
    --bg-dark: #02010a;
    --bg-card: rgba(15, 23, 42, 0.96);

    --purple-dark: #7e22ce;

    --text-light: #e5e5e5;
    --text-dim: #a3a3a3;
    --border-color: rgba(148, 163, 184, 0.5);
}

/* Override Notion's default white background */
html, body {
    background: radial-gradient(circle at top, #111827 0, #02010a 45%, #000 100%) !important;

    margin: 0;

}

/* Back to Archives button */
.arcane-back-btn {
    position: fixed;
    top: 1.5rem;
    left: 1.5rem;
    z-index: 1000;
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(15, 23, 42, 0.9);
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    backdrop-filter: blur(12px);
    transition: all 0.2s ease;
}

.arcane-back-btn:hover {
    color: var(--purple-light);
    border-color: rgba(147, 51, 234, 0.8);
    transform: translateX(-2px);
}

/* Main content container */
.page, article {
    max-width: 900px;

    background: radial-gradient(circle at top, rgba(147, 51, 234, 0.12), rgba(15, 23, 42, 0.98));

a {

/* Text styling */
p {

    line-height: 1.7;
    margin: 1rem 0;
}

/* Headers */
h2, h3, h4, h5, h6 {
    color: var(--text-light) !important;
    margin-top: 2rem;
    margin-bottom: 1rem;
}

h2 { font-size: 1.7rem !important; }
h3 { font-size: 1.4rem !important; }
h4 { font-size: 1.2rem !important; }

/* Lists */
ul, ol {

    padding-left: 1.5rem;
}

li {
    color: var(--text-light) !important;
    margin: 0.5rem 0;
}

/* Code blocks */
code, pre {
    background: rgba(15, 23, 42, 0.95) !important;
    border: 1px solid rgba(148, 163, 184, 0.3) !important;
    color: var(--purple-light) !important;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
}

pre {
    padding: 1rem !important;
    overflow-x: auto;
}

/* Dividers */
hr {
    border: none;
    border-top: 1px solid rgba(148, 163, 184, 0.3);
    margin: 2rem 0;
}

/* Blockquotes */
blockquote {
    border-left: 3px solid var(--purple);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    color: var(--text-dim) !important;
    font-style: italic;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
}

th, td {
    padding: 0.8rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    color: var(--text-light) !important;
}

th {
    background: rgba(147, 51, 234, 0.2);
    font-weight: 600;
}

/* Images */
img {

    border-radius: 12px;
    margin: 1.5rem 0;
}

/* Mobile responsiveness */
@media (max-width: 768px) {
    .page, article {

    h4 { font-size: 1rem !important; }

    .page-header-icon {

    }

    table {
        display: block;
        overflow-x: auto;

    }

    th, td {
        padding: 0.6rem;
        font-size: 0.85rem;
    }

    pre {

        font-size: 0.85rem;
        overflow-x: auto;
    }
}

@media (max-width: 480px) {
    .page, article {

        font-size: 0.85rem;
    }

    .arcane-back-btn {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
    }
}
