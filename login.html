<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.2);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-section img {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
        
        .logo-section h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .logo-section p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.9rem;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--purple);
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.4);
        }
        
        .btn-google {
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-google:hover {
            background: #f5f5f5;
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-dim);
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(147, 51, 234, 0.2);
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .toggle-mode {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-dim);
        }
        
        .toggle-mode a {
            color: var(--purple-light);
            text-decoration: none;
            font-weight: 600;
        }
        
        .toggle-mode a:hover {
            color: var(--purple);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        
        /* FOOTER - NOW BELOW CARD */
        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
            margin-top: auto;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: var(--purple-light);
        }
        
        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        
        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .main-wrapper {
                padding: 1rem 0.5rem;
            }
            
            .login-container {
                padding: 2rem 1.5rem;
                max-width: 100%;
            }
            
            .logo-section h1 {
                font-size: 1.5rem;
            }
            
            .logo-section img {
                width: 60px;
                height: 60px;
            }
            
            .form-group input {
                padding: 0.8rem;
                font-size: 16px; /* Prevents zoom on iOS */
            }
            
            .btn {
                padding: 0.9rem;
                font-size: 0.95rem;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem 1rem;
            }
            
            .divider::before,
            .divider::after {
                width: 35%;
            }
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loadingScreen" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    transition: opacity 0.5s, visibility 0.5s;
">
    <img src="ArcaneA.png" alt="The Arcane Archives" style="width: 150px; height: 150px; margin-bottom: 3rem; animation: logoPulse 2s ease-in-out infinite;">
    
    <div style="width: 300px; max-width: 90%; margin-bottom: 1rem;">
        <div style="
            width: 100%;
            height: 6px;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 10px;
            overflow: hidden;
        ">
            <div id="loadingBar" style="
                width: 0%;
                height: 100%;
                background: linear-gradient(90deg, #9333ea, #a78bfa);
                border-radius: 10px;
                transition: width 0.3s ease;
            "></div>
        </div>
    </div>
    
    <div id="loadingText" style="
        color: #a78bfa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        min-height: 30px;
        text-align: center;
    ">Unlocking the archives...</div>
</div>

<style>
@keyframes logoPulse {
    0%, 100% {
        transform: scale(1);
        opacity: 1;
    }
    50% {
        transform: scale(1.05);
        opacity: 0.8;
    }
}
</style>

<script>
// Enhanced loading screen with rotating messages
(function() {
    const loadingScreen = document.getElementById('loadingScreen');
    const loadingBar = document.getElementById('loadingBar');
    const loadingText = document.getElementById('loadingText');
    
    const messages = [
        'Unlocking the archives...',
        'Preparing your journey...',
        'Keep this a secret...',
        'Loading forbidden knowledge...',
        'Initializing consciousness shift...',
        'Breaking the matrix...'
    ];
    
    let progress = 0;
    let messageIndex = 0;
    
    // Rotate messages
    const messageInterval = setInterval(() => {
        messageIndex = (messageIndex + 1) % messages.length;
        loadingText.textContent = messages[messageIndex];
    }, 800);
    
    // Progress bar
    const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            clearInterval(messageInterval);
            loadingText.textContent = 'Welcome to the archives...';
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }, 300);
        }
        loadingBar.style.width = progress + '%';
    }, 200);
    
    // Ensure loading completes
    window.addEventListener('load', () => {
        setTimeout(() => {
            progress = 100;
            clearInterval(interval);
            clearInterval(messageInterval);
            loadingBar.style.width = '100%';
            loadingText.textContent = 'Welcome to the archives...';
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }, 300);
        }, 500);
    });
})();
</script>


    <div class="main-wrapper">
        <div class="login-container">
            <div class="logo-section">
                <img src="ArcaneA.png" alt="The Arcane Archives">
                <h1>Welcome Back</h1>
                <p>Access the forbidden knowledge</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                
                <button class="btn btn-primary" id="loginBtn">🔓 Login</button>
                
                <div class="divider">OR</div>
                
                <button class="btn btn-google" id="googleBtn">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                    Continue with Google
                </button>
            </div>

            <div id="signupForm" style="display: none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                </div>
                
                <button class="btn btn-primary" id="signupBtn">🔓 Create Account</button>
                
                <div class="divider">OR</div>
                
                <button class="btn btn-google" id="googleSignupBtn">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                    Sign up with Google
                </button>
            </div>

            <div class="toggle-mode">
                <span id="toggleText">Don't have an account? <a href="#" id="toggleBtn">Sign up</a></span>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="Privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="refund-policy.html">Refund Policy</a>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 The Arcane Archives. All rights reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w",
            authDomain: "arcane-archives-3b0f5.firebaseapp.com",
            projectId: "arcane-archives-3b0f5",
            storageBucket: "arcane-archives-3b0f5.firebasestorage.app",
            messagingSenderId: "264237235055",
            appId: "1:264237235055:web:4a2e5605b0ffb5307f069a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let isLoginMode = true;

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        document.getElementById('toggleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('loginForm').style.display = isLoginMode ? 'block' : 'none';
            document.getElementById('signupForm').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('toggleText').innerHTML = isLoginMode ? 
                'Don\'t have an account? <a href="#" id="toggleBtn">Sign up</a>' :
                'Already have an account? <a href="#" id="toggleBtn">Login</a>';
            
            document.getElementById('toggleBtn').addEventListener('click', arguments.callee);
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            }
        });

        document.getElementById('signupBtn').addEventListener('click', async () => {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showError('Please fill all fields');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            }
        });

        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            }
        });

        document.getElementById('googleSignupBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            }
        });

        ['email', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
        });

        ['signupEmail', 'signupPassword', 'confirmPassword'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('signupBtn').click();
            });
        });
    </script>
</body>
</html>
