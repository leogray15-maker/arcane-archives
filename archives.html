    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;

      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      backdrop-filter: blur(12px);
      transition: all 0.2s;
    }
    .back-btn:hover {
      color: var(--purple-light);
      border-color: rgba(147, 51, 234, 0.8);
      transform: translateX(-2px);
    }

    /* Header */
    .header {
      max-width: 1200px;
      margin: 2.5rem auto 0;
      padding: 1.5rem 1.5rem 0.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
      color: var(--text-light);

    .logo img {
      height: 32px;
      width: 32px;
    }

    /* Main container */
    .main-content {
      max-width: 1200px;
      margin: 0 auto 4rem;
      padding: 0 1.5rem;
    }

    .page-card {
      margin-top: 1.5rem;
      background: radial-gradient(circle at top, rgba(147, 51, 234, 0.12), rgba(15, 23, 42, 0.98));
      border-radius: 24px;
      border: 1px solid var(--border-color);
      box-shadow: 0 30px 120px rgba(15, 23, 42, 0.85), 0 0 40px rgba(147, 51, 234, 0.25);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Notion content tweaks */
    .notion-page {
      line-height: 1.6;
    }

    .page-cover-image {
      display: block;
      object-fit: cover;
      width: 100%;
      max-height: 260px;
      border-radius: 18px;
      margin-bottom: 1.25rem;
    }

    .page-header-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .page-title {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .page-title span {
      background: linear-gradient(135deg, var(--purple-light), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-description {
      color: var(--text-dim);
      margin-bottom: 1.2rem;
    }

    .page-body {
      margin-top: 1rem;
    }

    /* Course / section links (Notion link-to-page blocks) */
    figure.link-to-page {
      margin: 0.6rem 0;
      padding: 0;
      border: none;
    }

    figure.link-to-page a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.55);
      text-decoration: none;
      color: var(--text-light);
      font-size: 0.95rem;
      transition: all 0.18s;
    }

    figure.link-to-page a:hover {
      border-color: rgba(147, 51, 234, 0.9);
      background: radial-gradient(circle at top left, rgba(147, 51, 234, 0.25), rgba(15, 23, 42, 0.98));
      transform: translateY(-1px);
    }

    figure.link-to-page .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3em;
      height: 1.3em;
      font-size: 1.1rem;
    }

    hr {
      border: none;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      margin: 1.5rem 0 1rem;
    }

    p {
      margin: 0.3rem 0;
      color: var(--text-light);
      font-size: 0.95rem;
    }

    /* Footer */
    footer {
      background: rgba(5, 5, 5, 0.95);

    .footer-links {

    .footer-links a {

    }

    .footer-links a:hover {
      color: var(--purple-light);
    }

    .footer-bottom {
      color: var(--text-dim);
