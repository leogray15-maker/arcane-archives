<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcane Alerts | The Arcane Archives</title>
  <link rel="icon" href="ArcaneA.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      color: #e5e7eb;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 1rem;
    }

    .container { max-width: 1800px; margin: 0 auto; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 0.5rem;
      color: #a855f7;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
    }
    .back-btn:hover { background: rgba(139, 92, 246, 0.2); transform: translateX(-2px); }

    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    .header p { color: #9ca3af; font-size: clamp(0.9rem, 2vw, 1rem); }

    /* ADMIN FORM - Keeping your existing form styles */
    #alertForm {
      display: none;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(20px);
    }
    #alertForm.visible { display: block; }

    .form-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label {
      font-size: 0.8rem;
      color: #9ca3af;
      font-weight: 600;
      text-transform: uppercase;
    }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 0.5rem;
      padding: 0.875rem;
      color: #e5e7eb;
      font-size: 0.95rem;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      grid-column: 1 / -1;
    }

    .post-btn {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border: none;
      border-radius: 0.5rem;
      padding: 1rem 2rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }

    /* MAIN LAYOUT */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 450px;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    /* CHART SECTION */
    .chart-section {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
    }
    
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .chart-title { 
      font-size: 1.25rem; 
      font-weight: 700; 
      color: #e5e7eb;
    }
    
    .price-display {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    
    .current-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #22c55e;
    }
    
    .price-change {
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .chart-container {
      width: 100%;
      height: 600px;
      background: #020617;
      border-radius: 0.75rem;
      position: relative;
      border: 1px solid rgba(139, 92, 246, 0.1);
    }
    
    #priceChart {
      width: 100%;
      height: 100%;
    }

    /* Keep all your existing sidebar, trade card, and performance styles */
    .trades-sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
    .live-trades-section {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(20px);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    
    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .live-badge {
      background: #22c55e;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.5;} }

    #alertsContainer {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 600px;
      overflow-y: auto;
    }

    .alert-card {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 0.75rem;
      padding: 1rem;
    }

    @media (max-width: 1200px) {
      .main-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div class="header">
      <h1>Arcane Trading Floor</h1>
      <p>Live XAUUSD data with ICT Killzone sessions</p>
    </div>

    <!-- Admin Form (keeping your existing form) -->
    <div id="alertForm">
      <div class="form-title">📊 Post New Trade Signal</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Pair</label>
          <select id="pairInput">
            <option value="XAUUSD">XAUUSD (Gold)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Direction</label>
          <select id="directionSelect">
            <option value="Buy">Buy</option>
            <option value="Sell">Sell</option>
          </select>
        </div>
        <div class="form-group">
          <label>Entry Price</label>
          <input type="text" id="entryInput" placeholder="e.g. 2650.00" />
        </div>
        <div class="form-group">
          <label>Stop Loss</label>
          <input type="text" id="slInput" placeholder="e.g. 2640.00" />
        </div>
        <div class="form-group">
          <label>TP1</label>
          <input type="text" id="tp1Input" placeholder="e.g. 2660.00" />
        </div>
        <div class="form-group">
          <label>TP2</label>
          <input type="text" id="tp2Input" placeholder="e.g. 2670.00" />
        </div>
        <div class="form-group">
          <label>TP3</label>
          <input type="text" id="tp3Input" placeholder="e.g. 2680.00" />
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Analysis Notes</label>
          <textarea id="notesInput" placeholder="Share your analysis..."></textarea>
        </div>
      </div>
      <button id="postAlertBtn" class="post-btn">Post Trade Signal</button>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Chart Section with Alpha Vantage -->
      <div class="chart-section">
        <div class="chart-header">
          <div class="chart-title">📈 XAUUSD Live Chart</div>
          <div class="price-display">
            <div class="current-price" id="currentPrice">Loading...</div>
            <div class="price-change" id="priceChange">--</div>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- Live Signals (keeping your existing sidebar) -->
      <div class="trades-sidebar">
        <div class="live-trades-section">
          <div class="section-header">
            <div class="section-title">
              <span class="live-badge"></span>
              Live Signals
            </div>
          </div>
          <div id="alertsContainer">
            <div class="alert-card">
              <div style="text-align: center; color: #9ca3af;">Loading trade signals...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Performance Section (keeping your existing) -->
    <div class="performance-section" style="background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 1rem; padding: 2rem;">
      <div class="section-title" style="margin-bottom: 2rem; font-size: 1.25rem; font-weight: 700;">📊 Performance Overview</div>
      <div id="performanceStats">
        <!-- Stats will be populated by alerts.js -->
      </div>
    </div>
  </div>

  <!-- Chart.js for custom chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Alpha Vantage Chart Script -->
  <script>
    // Alpha Vantage API Key (FREE - get yours at alphavantage.co)
    const ALPHA_VANTAGE_KEY = 'demo'; // Replace with your key
    
    let chartInstance = null;
    
    // Fetch XAUUSD data from Alpha Vantage
    async function fetchGoldPrice() {
      try {
        const response = await fetch(
          `https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=XAU&to_symbol=USD&interval=15min&apikey=${ALPHA_VANTAGE_KEY}`
        );
        const data = await response.json();
        
        if (data['Time Series FX (15min)']) {
          const timeSeries = data['Time Series FX (15min)'];
          return Object.entries(timeSeries).map(([time, values]) => ({
            time: new Date(time),
            open: parseFloat(values['1. open']),
            high: parseFloat(values['2. high']),
            low: parseFloat(values['3. low']),
            close: parseFloat(values['4. close'])
          })).reverse();
        }
        return [];
      } catch (error) {
        console.error('Error fetching price data:', error);
        return [];
      }
    }
    
    // ICT Killzone times (EST)
    function getSessionColor(hour) {
      // Asian: 20:00-00:00
      if (hour >= 20 || hour < 0) return 'rgba(41, 98, 255, 0.1)';
      // London: 03:00-12:00
      if (hour >= 3 && hour < 12) return 'rgba(255, 152, 0, 0.1)';
      // New York: 08:00-17:00
      if (hour >= 8 && hour < 17) return 'rgba(120, 123, 134, 0.1)';
      return 'rgba(0,0,0,0)';
    }
    
    // Initialize Chart
    async function initChart() {
      const priceData = await fetchGoldPrice();
      
      if (priceData.length === 0) {
        document.getElementById('currentPrice').textContent = 'Data unavailable';
        return;
      }
      
      // Update current price
      const latestPrice = priceData[priceData.length - 1].close;
      const previousPrice = priceData[priceData.length - 2]?.close || latestPrice;
      const change = latestPrice - previousPrice;
      const changePercent = ((change / previousPrice) * 100).toFixed(2);
      
      document.getElementById('currentPrice').textContent = `$${latestPrice.toFixed(2)}`;
      document.getElementById('currentPrice').style.color = change >= 0 ? '#22c55e' : '#ef4444';
      document.getElementById('priceChange').textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePercent}%)`;
      document.getElementById('priceChange').style.color = change >= 0 ? '#22c55e' : '#ef4444';
      
      // Create chart
      const ctx = document.getElementById('priceChart').getContext('2d');
      
      if (chartInstance) {
        chartInstance.destroy();
      }
      
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: priceData.map(d => d.time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })),
          datasets: [{
            label: 'XAUUSD',
            data: priceData.map(d => d.close),
            borderColor: '#a855f7',
            backgroundColor: 'rgba(168, 85, 247, 0.1)',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#a855f7'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleColor: '#e5e7eb',
              bodyColor: '#9ca3af',
              borderColor: 'rgba(139, 92, 246, 0.3)',
              borderWidth: 1
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(139, 92, 246, 0.1)' },
              ticks: { color: '#9ca3af', maxTicksLimit: 10 }
            },
            y: {
              grid: { color: 'rgba(139, 92, 246, 0.1)' },
              ticks: { color: '#9ca3af' },
              position: 'right'
            }
          },
          interaction: {
            mode: 'nearest',
            axis: 'x',
            intersect: false
          }
        }
      });
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initChart();
      // Refresh every 5 minutes
      setInterval(initChart, 5 * 60 * 1000);
    });
  </script>

  <!-- Your existing alerts.js -->
  <script type="module" src="alerts.js"></script>
</body>
</html>
