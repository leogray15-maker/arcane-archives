<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Alerts | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --gold: #fbbf24;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
            --border-color: rgba(147, 51, 234, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        
        .nav-container {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo img { height: 40px; width: auto; }
        
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
        }
        
        /* Main Content */
        .main-content {
            margin-top: 70px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* TradingView Container */
        .tv-container {
            background: rgba(5, 5, 5, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.1);
        }
        
        .tradingview-widget-container {
            width: 100%;
            height: 500px;
            border-radius: 10px;
            overflow: hidden;
        }
        
        /* Alerts Section */
        .alerts-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .alerts-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }
        
        .alerts-subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        
        /* Push Notification Info */
        #pushInfo {
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-dim);
        }
        
        #pushInfo.enabled {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        
        /* New Alert Notification Banner */
        #newAlertNotification {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            padding: 1rem;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
            cursor: pointer;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 5px 20px rgba(147, 51, 234, 0.4);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        /* Admin Form */
        .alert-form {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            display: none;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.2);
        }
        
        .alert-form.visible { display: block; }
        
        .alert-form h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--purple-light);
        }
        
        .alert-form label {
            display: block;
            margin-bottom: 1.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .alert-form textarea,
        .alert-form input {
            width: 100%;
            margin-top: 0.5rem;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(147, 51, 234, 0.3);
            background: rgba(5, 5, 5, 0.5);
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .alert-form textarea:focus,
        .alert-form input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.3);
        }
        
        .alert-form textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .alert-form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .alert-form button {
            width: 100%;
            padding: 1.2rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .alert-form button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.4);
        }
        
        .alert-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Alerts Feed */
        .alerts-feed { margin-top: 2rem; }
        
        .alert-card {
            background: rgba(5, 5, 5, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        
        .alert-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
            border-color: var(--purple);
        }
        
        .alert-header-line {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .alert-header-line .badge {
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            color: var(--bg-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 700;
        }
        
        .alert-text {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            color: var(--text-light);
        }
        
        .alert-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .trade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .trade-pill {
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem;
            transition: all 0.3s;
        }
        
        .trade-pill:hover {
            background: rgba(147, 51, 234, 0.2);
            transform: translateY(-2px);
        }
        
        .trade-pill .label {
            display: block;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }
        
        .trade-pill .value {
            color: var(--purple-light);
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .trade-pill.entry .value { color: #10b981; }
        .trade-pill.sl .value { color: #ef4444; }
        .trade-pill.tp .value { color: var(--gold); }
        
        /* Reactions */
        .alert-reactions {
            display: flex;
            gap: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(147, 51, 234, 0.1);
        }
        
        .reaction {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
        }
        
        .reaction:hover {
            background: rgba(147, 51, 234, 0.2);
            border-color: var(--purple);
            transform: scale(1.1);
        }
        
        .reaction.active {
            background: rgba(147, 51, 234, 0.3);
            border-color: var(--purple);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
        }
        
        .reaction .count {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .main-content { padding: 1rem; }
            .alerts-title { font-size: 2rem; }
            .trade-grid { grid-template-columns: repeat(2, 1fr); }
            .alert-form-row { grid-template-columns: 1fr; }
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <a href="dashboard.html" class="logo">
                <img src="ArcaneA.png" alt="Logo">
                THE ARCANE ARCHIVES
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <!-- TradingView Chart -->
        <div class="tv-container">
            <div class="tradingview-widget-container">
                <div id="tradingview_chart"></div>
            </div>
        </div>

        <!-- Alerts Section -->
        <div class="alerts-header">
            <h1 class="alerts-title">⚡ Arcane Alerts</h1>
            <p class="alerts-subtitle">Live XAUUSD ritual setups streamed directly from The Archives</p>
        </div>

        <!-- Push Notifications Info -->
        <div id="pushInfo">
            🔔 Enable notifications in your browser to receive Arcane Alerts instantly
        </div>

        <!-- New Alert Banner -->
        <div id="newAlertNotification">
            🔮 New Arcane Alert Posted - Click to View
        </div>

        <!-- Admin Post Form -->
        <div id="alertForm" class="alert-form">
            <h3>📝 Post New Arcane Alert</h3>
            
            <label>
                Analysis / Commentary
                <textarea id="alertText" placeholder="Break down the setup, liquidity zones, market narrative..."></textarea>
            </label>

            <div class="alert-form-row">
                <label>
                    Entry Price
                    <input id="entryInput" type="text" placeholder="e.g., 2350.50">
                </label>
                <label>
                    Stop Loss
                    <input id="slInput" type="text" placeholder="e.g., 2344.00">
                </label>
            </div>

            <div class="alert-form-row">
                <label>
                    Take Profit 1
                    <input id="tp1Input" type="text" placeholder="First target">
                </label>
                <label>
                    Take Profit 2
                    <input id="tp2Input" type="text" placeholder="Second target">
                </label>
            </div>

            <div class="alert-form-row">
                <label>
                    Take Profit 3
                    <input id="tp3Input" type="text" placeholder="Final target">
                </label>
                <label>
                    Chart Image
                    <input id="alertImage" type="file" accept="image/*">
                </label>
            </div>

            <button id="postAlertBtn">Post Arcane Alert</button>
        </div>

        <!-- Alerts Feed -->
        <div id="alertsFeed" class="alerts-feed">
            <div class="loading">Loading alerts</div>
        </div>
    </div>

    <!-- TradingView Script -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            width: "100%",
            height: 500,
            symbol: "OANDA:XAUUSD",
            interval: "15",
            theme: "dark",
            style: "1",
            locale: "en",
            toolbar_bg: "#0a0a0a",
            enable_publishing: false,
            hide_side_toolbar: false,
            allow_symbol_change: false,
            container_id: "tradingview_chart",
            studies: ["RSI@tv-basicstudies", "MASimple@tv-basicstudies"]
        });
    </script>

    <!-- Main Alerts Script -->
    <script type="module" src="alerts.js"></script>
</body>
</html>
