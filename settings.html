<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | The Arcane Archives</title>
    <link rel="icon" href="ArcaneA.png">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --purple: #9333ea;
            --purple-dark: #7e22ce;
            --purple-light: #a78bfa;
            --text-light: #e5e5e5;
            --text-dim: #a3a3a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(147, 51, 234, 0.2);
        }

        .nav-container {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 250px;
            height: calc(100vh - 70px);
            background: var(--bg-darker);
            border-right: 1px solid rgba(147, 51, 234, 0.2);
            padding: 2rem 0;
            overflow-y: auto;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .sidebar-menu a:hover {
            background: rgba(147, 51, 234, 0.1);
            color: var(--purple-light);
        }

        .sidebar-menu a.active {
            background: rgba(147, 51, 234, 0.2);
            color: var(--purple-light);
            border-left: 3px solid var(--purple);
        }

        .main-content {
            margin-left: 250px;
            margin-top: 70px;
            padding: 3rem;
            min-height: calc(100vh - 70px);
        }

        .page-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        .settings-section {
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .settings-section h2 {
            color: var(--purple-light);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(147, 51, 234, 0.05);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--purple);
        }

        .form-group input:read-only {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .avatar-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 1rem;
            max-width: 500px;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .avatar-option:hover {
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.3);
        }

        .btn-secondary {
            background: rgba(147, 51, 234, 0.1);
            color: var(--purple-light);
            border: 1px solid rgba(147, 51, 234, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(147, 51, 234, 0.2);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .success-message, .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .sidebar {
                left: -250px;
                transition: left 0.3s;
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .button-group {
                flex-direction: column;
            }
        }
    
        footer {
            background: rgba(5, 5, 5, 0.95);
            padding: 1.5rem;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            text-align: center;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .footer-links a:hover {
            color: var(--purple-light);
        }
        .footer-bottom {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <a href="dashboard.html" class="logo">
                <img src="ArcaneA.png" alt="Logo"> THE ARCANE ARCHIVES
            </a>
            <div class="user-avatar" id="userAvatar">?</div>
        </div>
    </nav>

    <aside class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="courses.html">📚 All Courses</a></li>
            <li><a href="community.html">💬 Community</a></li>
            <li><a href="live-calls.html">🎙️ Live Calls</a></li>
            <li><a href="wins.html">🏆 Wins Board</a></li>
            <li><a href="settings.html" class="active">⚙️ Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Settings</h1>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <div class="settings-section">
            <h2>Account Settings</h2>
            <div class="form-group">
                <label>Username (Read Only)</label>
                <input type="text" id="username" readonly>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
        </div>

        <div class="settings-section">
            <h2>Profile Settings</h2>
            <div class="form-group">
                <label>Avatar</label>
                <div class="avatar-selection">
                    <div class="avatar-option selected" data-emoji="👤" style="background: linear-gradient(135deg, #9333ea, #7e22ce);">👤</div>
                    <div class="avatar-option" data-emoji="🔥" style="background: linear-gradient(135deg, #9333ea, #7e22ce);">🔥</div>
                    <div class="avatar-option" data-emoji="⚡" style="background: linear-gradient(135deg, #06b6d4, #0891b2);">⚡</div>
                    <div class="avatar-option" data-emoji="👑" style="background: linear-gradient(135deg, #a78bfa, #9333ea);">👑</div>
                    <div class="avatar-option" data-emoji="💎" style="background: linear-gradient(135deg, #8b5cf6, #6d28d9);">💎</div>
                    <div class="avatar-option" data-emoji="🎯" style="background: linear-gradient(135deg, #ec4899, #be185d);">🎯</div>
                    <div class="avatar-option" data-emoji="🧠" style="background: linear-gradient(135deg, #9333ea, #7e22ce);">🧠</div>
                    <div class="avatar-option" data-emoji="💪" style="background: linear-gradient(135deg, #06b6d4, #0891b2);">💪</div>
                </div>
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Enter display name">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Tell the brotherhood about yourself..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="saveSettingsBtn">💾 Save Changes</button>
            <button class="btn btn-secondary" id="changePasswordBtn">🔒 Change Password</button>
            <button class="btn btn-danger" id="deleteAccountBtn">🗑️ Delete Account</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, updateEmail, updatePassword, deleteUser } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w",
            authDomain: "arcane-archives-3b0f5.firebaseapp.com",
            projectId: "arcane-archives-3b0f5",
            storageBucket: "arcane-archives-3b0f5.firebasestorage.app",
            messagingSenderId: "264237235055",
            appId: "1:264237235055:web:4a2e5605b0ffb5307f069a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let selectedAvatar = '👤';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                const username = user.displayName || user.email.split('@')[0];
                document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();
                document.getElementById('username').value = username;
                document.getElementById('email').value = user.email;

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.displayName) document.getElementById('displayName').value = data.displayName;
                    if (data.bio) document.getElementById('bio').value = data.bio;
                    if (data.avatar) {
                        selectedAvatar = data.avatar;
                        document.querySelectorAll('.avatar-option').forEach(opt => {
                            opt.classList.remove('selected');
                            if (opt.dataset.emoji === data.avatar) opt.classList.add('selected');
                        });
                        document.getElementById('userAvatar').textContent = data.avatar;
                    }
                }
            }
        });

        document.querySelectorAll('.avatar-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedAvatar = option.dataset.emoji;
                document.getElementById('userAvatar').textContent = selectedAvatar;
            });
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            const saveBtn = document.getElementById('saveSettingsBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '💾 Saving...';

            try {
                await setDoc(doc(db, 'users', currentUser.uid), {
                    username: currentUser.displayName || currentUser.email.split('@')[0],
                    email: currentUser.email,
                    displayName: document.getElementById('displayName').value.trim(),
                    bio: document.getElementById('bio').value.trim(),
                    avatar: selectedAvatar,
                    updatedAt: new Date()
                }, { merge: true });

                const newEmail = document.getElementById('email').value.trim();
                if (newEmail && newEmail !== currentUser.email) {
                    try {
                        await updateEmail(currentUser, newEmail);
                        showSuccess('Settings saved! Please verify your new email.');
                    } catch (emailError) {
                        if (emailError.code === 'auth/requires-recent-login') {
                            showError('Please log out and log back in to change your email.');
                        } else {
                            showError('Email update failed: ' + emailError.message);
                        }
                    }
                } else {
                    showSuccess('Settings saved successfully! ✅');
                }

                localStorage.setItem('userAvatar', selectedAvatar);
            } catch (error) {
                showError('Failed to save settings. Please try again.');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 Save Changes';
            }
        });

        document.getElementById('changePasswordBtn').addEventListener('click', async () => {
            const newPassword = prompt('Enter new password (minimum 6 characters):');
            if (!newPassword || newPassword.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }

            try {
                await updatePassword(currentUser, newPassword);
                showSuccess('Password changed successfully! ✅');
            } catch (error) {
                if (error.code === 'auth/requires-recent-login') {
                    showError('Please log out and log back in to change your password.');
                } else {
                    showError('Failed to change password: ' + error.message);
                }
            }
        });

        document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
            if (!confirm('⚠️ WARNING: This will permanently delete your account. Are you sure?')) return;
            const finalConfirm = prompt('Type "DELETE" to confirm:');
            if (finalConfirm !== 'DELETE') {
                showError('Account deletion cancelled.');
                return;
            }

            try {
                await setDoc(doc(db, 'users', currentUser.uid), { deleted: true, deletedAt: new Date() }, { merge: true });
                await deleteUser(currentUser);
                alert('Your account has been deleted.');
                window.location.href = 'index.html';
            } catch (error) {
                if (error.code === 'auth/requires-recent-login') {
                    showError('Please log out and log back in to delete your account.');
                } else {
                    showError('Failed to delete account: ' + error.message);
                }
            }
        });

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });

        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            setTimeout(() => successMsg.style.display = 'none', 5000);
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => errorMsg.style.display = 'none', 5000);
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>

    <footer>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="Privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
            <a href="refund-policy.html">Refund Policy</a>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 The Arcane Archives. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
