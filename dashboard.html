<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | The Arcane Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    body {
      margin: 0;
      background: #06030f;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #eee;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #0c071a;
      border-bottom: 1px solid #201735;
    }

    .nav h2 {
      margin: 0;
      color: #b29cff;
    }

    .nav button {
      background: transparent;
      border: 1px solid #b29cff;
      color: #b29cff;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .welcome {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: #120a26;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid #2c1d4e;
      box-shadow: 0 0 20px #00000040;
    }

    .card h3 {
      margin-top: 0;
      color: #cdbaff;
      margin-bottom: 10px;
    }

    .progress-bar-container {
      width: 100%;
      background: #1b1134;
      border-radius: 10px;
      height: 16px;
      margin-top: 10px;
    }

    .progress-bar {
      height: 16px;
      background: linear-gradient(90deg, #a67bff, #d7c2ff);
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .avatar-circle {
      width: 70px;
      height: 70px;
      background: #a67bff;
      color: #06030f;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .center {
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <div class="nav">
    <h2>The Arcane Archives</h2>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="container">

    <!-- WELCOME + AVATAR -->
    <div class="center">
      <div id="userAvatar" class="avatar-circle"></div>
      <div class="welcome">
        Welcome back, <span id="username">...</span> 🔮
      </div>
    </div>

    <!-- LEVEL + XP -->
    <div class="card">
      <h3>Your Progress</h3>

      <p>Level: <strong id="userLevel">...</strong></p>
      <p>XP: <strong id="currentXP">0</strong> / <strong id="nextLevelXP">100</strong></p>

      <div class="progress-bar-container">
        <div id="xpProgressBar" class="progress-bar"></div>
      </div>

      <p style="margin-top:10px;">XP Progress: <span id="xpProgressText">0 XP</span></p>
    </div>

    <!-- STATS -->
    <div class="card-grid">

      <div class="card">
        <h3>Courses Completed</h3>
        <p id="coursesCompleted" style="font-size:22px; font-weight:bold;">0</p>
      </div>

      <div class="card">
        <h3>Wins Posted</h3>
        <p id="winsPosted" style="font-size:22px; font-weight:bold;">0</p>
      </div>

      <div class="card">
        <h3>Calls Attended</h3>
        <p id="callsAttended" style="font-size:22px; font-weight:bold;">0</p>
      </div>

    </div>

  </div>

  <!-- FIREBASE + PROTECTION LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    // 🔥 YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w",
      authDomain: "arcane-archives-3b0f5.firebaseapp.com",
      projectId: "arcane-archives-3b0f5",
      storageBucket: "arcane-archives-3b0f5.firebasestorage.app",
      messagingSenderId: "264237235055",
      appId: "1:264237235055:web:4a2e5605b0ffb5307f069a",
      measurementId: "G-YGPLQHDXMM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // MAIN AUTH + PAYWALL LOGIC
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      // Fetch from Firestore 'Users' collection
      const ref = doc(db, "Users", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        alert("Your account is missing data. Please contact support.");
        return;
      }

      const data = snap.data();

      // PAYWALL PROTECTION
      if (data.subscriptionStatus !== "active") {
        alert("🔒 You must complete your membership payment to access The Arcane Archives.");
        window.location.href = "index.html#pricing";
        return;
      }

      // UPDATE UI
      document.getElementById("username").textContent =
        data.Username || user.displayName || user.email.split("@")[0];

      document.getElementById("userLevel").textContent =
        data.Level || "Apprentice";

      const xp = data.Xp || 0;
      document.getElementById("currentXP").textContent = xp;
      document.getElementById("nextLevelXP").textContent = 100;
      document.getElementById("xpProgressBar").style.width =
        Math.min(xp, 100) + "%";
      document.getElementById("xpProgressText").textContent = xp + " XP";

      document.getElementById("coursesCompleted").textContent =
        data.CoursesCompleted || 0;

      document.getElementById("winsPosted").textContent =
        data.WinsPosted || 0;

      document.getElementById("callsAttended").textContent =
        data.CallAttended || 0;

      // AVATAR
      const avatar = document.getElementById("userAvatar");
      const initial = (data.Username ||
        user.displayName ||
        user.email)[0].toUpperCase();
      avatar.textContent = initial;
    });

    // LOGOUT BUTTON
    document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
