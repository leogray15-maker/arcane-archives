<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | The Arcane Archives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="ArcaneA.png">
  <style>
    body {
      margin: 0;
      background: #06030f;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #eee;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #0c071a;
      border-bottom: 1px solid #201735;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-logo {
      height: 40px;
      width: auto;
    }

    .nav h2 {
      margin: 0;
      color: #b29cff;
    }

    .nav button {
      background: transparent;
      border: 1px solid #b29cff;
      color: #b29cff;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav button:hover {
      background: #b29cff;
      color: #06030f;
    }

    .container {
      padding: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .welcome {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .card {
      background: #120a26;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid #2c1d4e;
      box-shadow: 0 0 20px #00000040;
    }

    .card h3 {
      margin-top: 0;
      color: #cdbaff;
      margin-bottom: 10px;
    }

    .progress-bar-container {
      width: 100%;
      background: #1b1134;
      border-radius: 10px;
      height: 16px;
      margin-top: 10px;
    }

    .progress-bar {
      height: 16px;
      background: linear-gradient(90deg, #a67bff, #d7c2ff);
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .avatar-circle {
      width: 70px;
      height: 70px;
      background: #a67bff;
      color: #06030f;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .center {
      text-align: center;
    }

    .quick-links {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .quick-link {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #a67bff, #8b5cf6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .quick-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(166, 123, 255, 0.4);
    }

    .subscription-badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
      color: #4ade80;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
      
      .nav h2 {
        font-size: 16px;
      }
      
      .quick-links {
        flex-direction: column;
      }
      
      .quick-link {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <div class="nav">
    <div class="nav-left">
      <img src="ArcaneA.png" alt="Logo" class="nav-logo">
      <h2>The Arcane Archives</h2>
    </div>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="container">

    <!-- WELCOME + AVATAR -->
    <div class="center">
      <div id="userAvatar" class="avatar-circle">?</div>
      <div class="welcome">
        Welcome back, <span id="username">...</span> 🔮
      </div>
      <div id="subscriptionBadge" class="subscription-badge" style="display: none;">
        ✓ Active Member
      </div>
    </div>

    <!-- QUICK LINKS -->
    <div class="quick-links">
      <a href="courses.html" class="quick-link">📚 Browse Courses</a>
      <a href="community.html" class="quick-link">💬 Community Chat</a>
      <a href="live-calls.html" class="quick-link">🎙️ Live Calls</a>
      <a href="wins.html" class="quick-link">🏆 Share a Win</a>
      <a href="settings.html" class="quick-link">⚙️ Settings</a>
    </div>

    <!-- LEVEL + XP -->
    <div class="card" style="margin-top: 30px;">
      <h3>Your Progress</h3>

      <p>Level: <strong id="userLevel">...</strong></p>
      <p>XP: <strong id="currentXP">0</strong> / <strong id="nextLevelXP">100</strong></p>

      <div class="progress-bar-container">
        <div id="xpProgressBar" class="progress-bar"></div>
      </div>

      <p style="margin-top:10px;">XP Progress: <span id="xpProgressText">0 XP</span></p>
    </div>

    <!-- STATS -->
    <div class="card-grid">

      <div class="card">
        <h3>Courses Completed</h3>
        <p id="coursesCompleted" style="font-size:22px; font-weight:bold;">0</p>
      </div>

      <div class="card">
        <h3>Wins Posted</h3>
        <p id="winsPosted" style="font-size:22px; font-weight:bold;">0</p>
      </div>

      <div class="card">
        <h3>Calls Attended</h3>
        <p id="callsAttended" style="font-size:22px; font-weight:bold;">0</p>
      </div>

    </div>

  </div>

  <!-- FIREBASE + PROTECTION LOGIC with CENTRALIZED AUTH -->
  <script type="module">
    import { 
      protectPage, 
      updateUserAvatar, 
      setupLogoutButton 
    } from './auth-guard.js';

    // Protect this page and handle success
    protectPage({
      onSuccess: (user, userData) => {
        // Update UI with user data
        document.getElementById("username").textContent =
          userData.Username || user.displayName || user.email.split("@")[0];

        document.getElementById("userLevel").textContent =
          userData.Level || "Apprentice";

        const xp = userData.Xp || 0;
        document.getElementById("currentXP").textContent = xp;
        document.getElementById("nextLevelXP").textContent = 100;
        document.getElementById("xpProgressBar").style.width =
          Math.min(xp, 100) + "%";
        document.getElementById("xpProgressText").textContent = xp + " XP";

        document.getElementById("coursesCompleted").textContent =
          userData.CoursesCompleted || 0;

        document.getElementById("winsPosted").textContent =
          userData.WinsPosted || 0;

        document.getElementById("callsAttended").textContent =
          userData.CallAttended || 0;

        // Show subscription badge
        if (userData.subscriptionStatus === 'active') {
          document.getElementById("subscriptionBadge").style.display = 'inline-block';
        }

        // Update avatar
        updateUserAvatar(user, userData);
      }
    });

    // Setup logout button
    setupLogoutButton();
  </script>
</body>
</html>
