<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Trading Floor | The Arcane Archives</title>
  <link rel="icon" href="ArcaneA.png"/>
  <link rel="stylesheet" href="arcane-globals.css"/>

  <style>
    body { overflow: hidden; }

    /* ── Full-height layout ── */
    .tf-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--nav-h) - env(safe-area-inset-top, 0px));
      margin-top: calc(var(--nav-h) + env(safe-area-inset-top, 0px));
      position: relative;
      z-index: 2;
    }

    /* ── Top toolbar ── */
    .tf-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem;
      height: 46px;
      background: rgba(9,9,14,0.98);
      border-bottom: 1px solid var(--border-hi);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tf-toolbar::-webkit-scrollbar { display: none; }

    .tf-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-head);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-decoration: none;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: nowrap;
      transition: all 0.18s;
    }
    .tf-back:hover { color: var(--teal); border-color: var(--teal); }

    .tf-sep { width: 1px; height: 20px; background: var(--border); margin: 0 0.25rem; flex-shrink: 0; }

    /* Symbol search */
    .sym-search {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .sym-search:hover { border-color: var(--teal); }
    .sym-search input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-head);
      font-size: 0.62rem;
      font-weight: 700;
      width: 100px;
      letter-spacing: 0.08em;
    }
    .sym-search input::placeholder { color: var(--text-dim); }

    /* Timeframe buttons */
    .tf-time-group {
      display: flex;
      gap: 1px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tf-time-btn {
      padding: 0.22rem 0.55rem;
      font-family: var(--font-head);
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tf-time-btn:hover { color: var(--text); background: var(--bg-4); }
    .tf-time-btn.active { background: var(--teal-glow); color: var(--teal); }

    /* Chart type */
    .tf-chart-type {
      display: flex;
      gap: 1px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tf-ct-btn {
      padding: 0.22rem 0.6rem;
      font-size: 0.72rem;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .tf-ct-btn:hover   { color: var(--text); background: var(--bg-4); }
    .tf-ct-btn.active  { background: var(--teal-glow); color: var(--teal); }

    /* Indicator btn */
    .tf-indicator-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.22rem 0.7rem;
      font-family: var(--font-head);
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg-3);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
    }
    .tf-indicator-btn:hover { border-color: var(--teal); color: var(--teal); }

    .tf-price-display {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-left: auto;
      flex-shrink: 0;
    }
    .tf-current-price {
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    .tf-price-chg {
      font-family: var(--font-head);
      font-size: 0.62rem;
      font-weight: 700;
    }
    .tf-price-chg.up   { color: var(--green); }
    .tf-price-chg.down { color: var(--red); }

    /* ── Main area: chart + side panel ── */
    .tf-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Chart */
    .tf-chart-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #tv-chart {
      width: 100%;
      height: 100%;
    }

    /* Chart overlay info (top-left) */
    .chart-overlay {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .chart-sym-label {
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .chart-ohlc {
      display: flex;
      gap: 0.75rem;
      font-family: var(--font-head);
      font-size: 0.52rem;
      color: var(--text-dim);
    }
    .chart-ohlc span { letter-spacing: 0.04em; }
    .chart-ohlc .val { color: var(--text); }

    /* ── Side Panel ── */
    .tf-side {
      width: 260px;
      flex-shrink: 0;
      background: rgba(9,9,14,0.98);
      border-left: 1px solid var(--border-hi);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    /* Side tabs */
    .side-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .side-tab {
      flex: 1;
      padding: 0.6rem 0.5rem;
      font-family: var(--font-head);
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-align: center;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      text-transform: uppercase;
      transition: all 0.18s;
    }
    .side-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .side-tab:hover:not(.active) { color: var(--text); }

    .side-content { flex: 1; overflow-y: auto; }

    /* Quick stats strip */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      flex-shrink: 0;
    }
    .qs-cell {
      background: var(--bg-2);
      padding: 0.5rem 0.75rem;
    }
    .qs-label {
      font-family: var(--font-head);
      font-size: 0.42rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .qs-val {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 0.15rem;
    }
    .qs-val.up   { color: var(--green); }
    .qs-val.down { color: var(--red); }

    /* Watchlist items */
    .wl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .wl-item:hover, .wl-item.active { background: var(--bg-3); }
    .wl-item.active { border-left: 2px solid var(--gold); }
    .wl-left { display: flex; align-items: center; gap: 0.5rem; }
    .wl-sym {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .wl-name { font-size: 0.58rem; color: var(--text-dim); margin-top: 0.1rem; }
    .wl-right { text-align: right; }
    .wl-price { font-family: var(--font-head); font-size: 0.62rem; font-weight: 700; color: var(--text); }
    .wl-chg { font-family: var(--font-head); font-size: 0.52rem; font-weight: 600; }
    .wl-chg.up   { color: var(--green); }
    .wl-chg.down { color: var(--red); }

    /* Signal items */
    .sig-item {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .sig-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }
    .sig-sym {
      font-family: var(--font-head);
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text);
    }
    .sig-dir {
      font-family: var(--font-head);
      font-size: 0.52rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .sig-dir.long  { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
    .sig-dir.short { background: var(--red-glow);  color: var(--red);   border: 1px solid var(--border-red); }
    .sig-body { font-size: 0.65rem; color: var(--text-dim); }
    .sig-levels {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.4rem;
      font-family: var(--font-head);
      font-size: 0.5rem;
    }
    .sig-level { color: var(--text-muted); }
    .sig-level span { color: var(--text-dim); }

    /* Notes area */
    .notes-area {
      padding: 0.75rem;
    }
    .notes-textarea {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.72rem;
      padding: 0.6rem;
      resize: none;
      outline: none;
      height: 200px;
      transition: border-color 0.18s;
    }
    .notes-textarea:focus { border-color: var(--teal); }
    .notes-save {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.45rem;
      background: var(--teal-glow);
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      color: var(--teal);
      font-family: var(--font-head);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.18s;
    }
    .notes-save:hover { background: var(--teal); color: #000; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .tf-side { width: 220px; }
    }
    @media (max-width: 700px) {
      body { overflow: auto; }
      .tf-layout { height: auto; }
      .tf-body { flex-direction: column; }
      .tf-side { width: 100%; height: 300px; }
      #tv-chart { height: 50vh; }
      .tf-toolbar { flex-wrap: nowrap; }
    }
  </style>
</head>

<script type="module">
  import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import { getFirestore, doc, getDoc }   from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const app  = initializeApp({ apiKey:"AIzaSyAK9MheMvSeOpscic4lXUsIwa0J5ubVf6w", authDomain:"arcane-archives-3b0f5.firebaseapp.com", projectId:"arcane-archives-3b0f5" });
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const RANKS=[{min:0,label:'INITIATE'},{min:100,label:'ANALYST'},{min:500,label:'OPERATIVE'},{min:1500,label:'TACTICIAN'},{min:3000,label:'STRATEGIST'},{min:6000,label:'COMMANDER'},{min:10000,label:'ARCHON'}];
  function getRank(xp){ let r=RANKS[0]; RANKS.forEach(x=>{ if(xp>=x.min) r=x; }); return r; }

  onAuthStateChanged(auth, async user => {
    if (!user) { location.href='login.html'; return; }
    const snap = await getDoc(doc(db,'users',user.uid));
    const data = snap.exists() ? snap.data() : {};
    // ── Subscription gate ──────────────────────────────────────────
    const ADMIN_UIDS = ['U4PvQ0dilBco97hgXp3Awl45JX92','liMx3vjGGrgAta12IlKclq3Xwvr2'];
    const isAdmin = ADMIN_UIDS.includes(user.uid);
    const isPaid  = data.isPaid === true || data.subscriptionStatus === 'active';
    if (!isAdmin && !isPaid) { location.href = 'arcane-store.html'; return; }
    // ──────────────────────────────────────────────────────────────
    const xp = data.xp ?? 0;
    document.getElementById('nav-balance').textContent = `£${(data.balance??0).toFixed(2)}`;
    document.getElementById('nav-xp').textContent = xp.toLocaleString();
    document.getElementById('nav-rank').textContent = getRank(xp).label;
    if (user.photoURL) document.getElementById('nav-avatar').src = user.photoURL;
  });
</script>

<script>
/* ══ Stars ══ */
(function(){
  const canvas=document.getElementById('stars-canvas');
  const ctx=canvas.getContext('2d');let stars=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  function initStars(){stars=[];for(let i=0;i<150;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2,a:Math.random()*0.5+0.05,da:(Math.random()-0.5)*0.006});}
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();s.a+=s.da;if(s.a>0.7||s.a<0.05)s.da*=-1;});requestAnimationFrame(draw);}
  resize();initStars();draw();
  window.addEventListener('resize',()=>{resize();initStars();});
})();

/* ══ TradingView Widget ══ */
let tvWidget = null;
let currentSymbol = 'XAUUSD';
let currentTF = '240';
let currentType = 'candlestick';

function loadChart(symbol, tf, type) {
  symbol = symbol || currentSymbol;
  tf     = tf     || currentTF;
  type   = type   || currentType;
  currentSymbol = symbol;

  const container = document.getElementById('tv-chart');
  container.innerHTML = '';

  tvWidget = new TradingView.widget({
    symbol:           symbol,
    interval:         tf,
    container_id:     'tv-chart',
    datafeed:         new Datafeeds.UDFCompatibleDatafeed('https://demo_feed.tradingview.com'),
    library_path:     'https://www.tradingview.com/charting_library/',
    // Use the lightweight public chart instead:
    width:  '100%',
    height: '100%',
    locale: 'en',
    theme:  'dark',
    style:  type === 'candlestick' ? '1' : type === 'bars' ? '0' : type === 'line' ? '2' : '3',
    timezone: 'Etc/UTC',
    toolbar_bg: '#0a0a0f',
    hide_top_toolbar: true,
    hide_legend: false,
    withdateranges: false,
    allow_symbol_change: false,
    save_image: false,
    backgroundColor: '#0a0a0f',
    gridColor: 'rgba(0,212,255,0.05)',
    enable_publishing: false,
    overrides: {
      'paneProperties.background':       '#0a0a0f',
      'paneProperties.backgroundType':   'solid',
      'paneProperties.vertGridProperties.color': 'rgba(0,212,255,0.05)',
      'paneProperties.horzGridProperties.color': 'rgba(0,212,255,0.05)',
      'scalesProperties.textColor':      '#7a8499',
      'scalesProperties.lineColor':      'rgba(80,100,140,0.2)',
      'mainSeriesProperties.candleStyle.upColor':        '#00e676',
      'mainSeriesProperties.candleStyle.downColor':      '#ff3b3b',
      'mainSeriesProperties.candleStyle.borderUpColor':  '#00e676',
      'mainSeriesProperties.candleStyle.borderDownColor':'#ff3b3b',
      'mainSeriesProperties.candleStyle.wickUpColor':    '#00e676',
      'mainSeriesProperties.candleStyle.wickDownColor':  '#ff3b3b',
    }

}

// Fallback: Use the simple embed widget (no charting_library needed)
function loadSimpleChart(symbol, tf) {
  symbol = symbol || currentSymbol;
  tf = tf || currentTF;
  currentSymbol = symbol;

  const container = document.getElementById('tv-chart');
  container.style.background = '#0a0a0f';

  // Map interval to TradingView format
  const tfMap = {'1':'1','5':'5','15':'15','60':'60','240':'240','D':'1D','W':'1W'};
  const tvTF = tfMap[tf] || '240';

  container.innerHTML = `
    <div class="tradingview-widget-container" style="height:100%;width:100%">
      <div id="tradingview_embed" style="height:calc(100% - 32px);width:100%"></div>
    </div>`;

  new TradingView.widget({
    width:   '100%',
    height:  '100%',
    symbol:  symbol,
    interval: tvTF,
    timezone: 'Etc/UTC',
    theme:   'dark',
    style:   '1',
    locale:  'en',
    toolbar_bg:          '#0a0a0f',
    enable_publishing:   false,
    allow_symbol_change: true,
    save_image:          false,
    container_id:        'tradingview_embed',
    overrides: {
      'paneProperties.background':        '#0a0a0f',
      'paneProperties.backgroundType':    'solid',
      'paneProperties.vertGridProperties.color': 'rgba(0,212,255,0.05)',
      'paneProperties.horzGridProperties.color': 'rgba(0,212,255,0.05)',
      'mainSeriesProperties.candleStyle.upColor':        '#00e676',
      'mainSeriesProperties.candleStyle.downColor':      '#ff3b3b',
      'mainSeriesProperties.candleStyle.borderUpColor':  '#00e676',
      'mainSeriesProperties.candleStyle.borderDownColor':'#ff3b3b',
      'mainSeriesProperties.candleStyle.wickUpColor':    '#00e676',
      'mainSeriesProperties.candleStyle.wickDownColor':  '#ff3b3b',
    }
  });
}

function setTF(tf, el) {

/* ══ Live Watchlist Prices — powered by arcane-prices.js ══ */
function bindLivePrices() {
  const AP = window.ArcanePrices;
  if (!AP) return;

  // Mapping: watchlist symbol → { ArcanePrices key, decimal places }
  const MAP = {
    XAUUSD: { key:'XAU',    dec:2 },
    XAGUSD: { key:'XAG',    dec:3 },
    BTCUSD: { key:'BTC',    dec:0 },
    ETHUSD: { key:'ETH',    dec:2 },
    SPX500: { key:'SPX',    dec:2 },
    GBPUSD: { key:'GBPUSD', dec:4 },
    EURUSD: { key:'EURUSD', dec:4 },
    USDJPY: { key:'USDJPY', dec:2 },
  };

  AP.subscribe(data => {
    // Update watchlist rows
    Object.entries(MAP).forEach(([wlSym, {key, dec}]) => {
      const d = data[key];
      if (!d) return;
      const pEl = document.getElementById('wl-p-' + wlSym);
      const cEl = document.getElementById('wl-c-' + wlSym);
      if (pEl) pEl.textContent = AP.fmtPrice(d.price, dec);
      if (cEl) { cEl.textContent = AP.fmtChg(d.change); cEl.className = 'wl-chg ' + d.dir; }
    });

    // Update live price strip for the currently selected symbol
    const m = MAP[currentSymbol];
    if (m) {
      const d = data[m.key];
      if (d) {
        const lp = document.getElementById('live-price');
        const lc = document.getElementById('live-chg');
        if (lp) lp.textContent = AP.fmtPrice(d.price, m.dec);
        if (lc) { lc.textContent = AP.fmtChg(d.change); lc.className = 'tf-price-chg ' + d.dir; }
      }
    }
  });
}
